// ─── GLOSSARY ───
const GLOSSARY = [
  { term: "DAF (Donor-Advised Fund)", def: "A charitable savings account managed by a provider (like Fidelity Charitable or your local community foundation). You contribute, get an immediate tax deduction, then recommend grants to nonprofits whenever you're ready. The money grows tax-free while you decide." },
  { term: "Unrestricted gift", def: "A donation with no conditions on how it's used. The organization decides where it's needed most. This is considered the most flexible and trust-based form of giving." },
  { term: "Restricted / Directed gift", def: "A donation earmarked for a specific purpose, program, or project. The organization must use it as you specify and report back on how it was spent." },
  { term: "IRS Form 990", def: "An annual tax filing that most nonprofits must submit to the IRS. It's publicly available and shows an organization's revenue, expenses, executive compensation, and program activities. It's the most accessible financial document for evaluating a nonprofit." },
  { term: "Community foundation", def: "A local philanthropic organization that manages charitable funds for individuals and families. Like a DAF, but with local expertise — they know the organizations in your area and can advise on where your giving will have the most impact." },
  { term: "Private foundation", def: "A separate legal entity you create for charitable purposes. You control everything — investments, grants, governance. Requires legal setup ($5K-$25K), annual IRS filings, and a mandatory 5% annual distribution. Best suited for giving at $250K+/year." },
  { term: "Grant agreement", def: "A letter or document between a funder and an organization that outlines the terms of a gift — the amount, purpose, timeline, and any reporting expectations. Not a legal contract, but a mutual commitment." },
  { term: "Payment acknowledgment", def: "A written confirmation from a nonprofit that they received your gift. Required by the IRS for any gift over $250. Your CPA needs these for tax filing." },
  { term: "Endowment", def: "A fund where the principal (the original amount) is invested and preserved, and only the earnings are used for grants or operations. Endowments are designed to provide funding indefinitely — the money works forever." },
  { term: "Giving vehicle", def: "The method or structure you use to make charitable gifts. Options include personal giving (direct), donor-advised funds (DAFs), community foundations, and private foundations. Each has different tax treatment, flexibility, and complexity." },
  { term: "NIL (Name, Image, Likeness)", def: "The right of college athletes to earn money from their personal brand — through endorsements, social media, appearances, and more. NIL income can be used for charitable giving, but may have compliance considerations depending on your school and conference." },
  { term: "GPS (Giving Policy Statement)", def: "Your personal giving compass, created through StewardHouse's Giving Studio. It captures your values, causes, geography, and preferences in your own words — then guides every giving decision you make." },
  { term: "Trust-based philanthropy", def: "An approach to giving that centers trust between funders and organizations. It includes unrestricted funding, multi-year commitments, simplified reporting, and genuine relationship-building. It's not about blind trust — it's about building mutual accountability." },
];

// Simple fade wrapper
function Fade({ children, k }) {
  const [v, setV] = useState(false);
  useEffect(() => { setV(false); setTimeout(() => setV(true), 60); }, [k]);
  return <div style={{ opacity: v ? 1 : 0, transform: v ? "none" : "translateY(10px)", transition: "all 0.5s ease" }}>{children}</div>;
}

function Btn({ children, onClick, disabled, outline, small }) {
  return (
    <button onClick={onClick} disabled={disabled} style={{
      width: "100%", padding: small ? "10px 16px" : "15px 24px", borderRadius: 50,
      border: outline ? `1px solid ${C.border}` : "none",
      background: outline ? "transparent" : disabled ? C.border : "#1A2744",
      color: outline ? C.navy : disabled ? C.muted : "#F5F2ED",
      fontSize: small ? 13 : 15, fontWeight: 500, fontFamily: f,
      letterSpacing: "0.02em",
      cursor: disabled ? "not-allowed" : "pointer",
      marginTop: 10, transition: "all 0.2s",
    }}>{children}</button>
  );
}

function Tag({ text, bg }) {
  return <span style={{ display: "inline-block", padding: "5px 14px", borderRadius: 50, background: bg || C.cream, fontSize: 12, fontWeight: 400, fontFamily: f, color: C.text, margin: "0 4px 4px 0", letterSpacing: "0.02em" }}>{text}</span>;
}

function Card({ selected, onClick, label, desc, accent }) {

      {desc && <div style={{ fontSize: 13, color: C.light, fontFamily: f, marginTop: 3 }}>{desc}</div>}

}

function Chip({ selected, onClick, label }) {

// ─── ONBOARDING: LETTER ───

function Questions({ onComplete }) {
  // Restore saved progress
  const loadQ = () => { try { return JSON.parse(localStorage.getItem("sh_questions") || "{}"); } catch(e) { return {}; } };
  const savedQ = loadQ();
  const [step, setStep] = useState(savedQ.step || 0);
  const [a, setA] = useState({
    segment: "", stage: "", authority: "",
    causes: [], geo: [], geoDetail: "", lived: "", influence: "",
    visibility: "", trust: "", budget: "", depth: "", existingOrgs: "", legacy: "",
    ...savedQ.answers,
  });

    music: [

      { id: "rising", label: "Signed / Rising", desc: "Deal in place, career gaining momentum" },
      { id: "established", label: "Established", desc: "Touring, consistent releases, real income" },
      { id: "legacy", label: "Catalog / Legacy", desc: "Body of work generating ongoing royalties" },
    ],
    entertainment: [
      { id: "starting", label: "Starting Out", desc: "Auditions, small roles, building credits" },
      { id: "working", label: "Working", desc: "Consistent projects, income fluctuates by gig" },
      { id: "established", label: "Established", desc: "Recognizable, consistent offers, endorsements" },
      { id: "legacy", label: "Legacy", desc: "Long career, producing, business ventures" },
    ],
    creator: [
      { id: "growing", label: "Growing", desc: "Building audience, first monetization" },
      { id: "monetized", label: "Monetized", desc: "Subscriptions, brand deals, real income" },
      { id: "established", label: "Established", desc: "Multiple revenue streams, significant audience" },
      { id: "empire", label: "Empire", desc: "Business beyond content, investments, media deals" },
    ],
    other: [
      { id: "early", label: "Early career", desc: "Just getting started" },
      { id: "mid", label: "Mid-career", desc: "Established in my field" },
      { id: "senior", label: "Senior / Legacy", desc: "Later career or post-career" },
    ],
  };

  const AUTHORITY = [
    { id: "self", label: "Just me", desc: "I make my own financial decisions" },
    { id: "family_input", label: "Family has input", desc: "I decide, but my family weighs in" },
    { id: "guardian", label: "Parent or guardian", desc: "A parent or guardian manages my finances" },
    { id: "team", label: "I have a team", desc: "Manager, agent, or business manager handles finances" },
  ];

  const stageOptions = STAGES[a.segment] || STAGES.other;

  const steps = [
    // Q0: Segment
    { valid: !!a.segment, btnText: "Next", render: () => (
      <>
        <h2 style={{ fontSize: 22, color: C.navy, fontFamily: s, fontWeight: 400, marginBottom: 6 }}>What world are you in?</h2>
        <p style={{ fontSize: 13, color: C.light, fontFamily: f, marginBottom: 16, lineHeight: 1.5 }}>This shapes everything that follows.</p>
        {SEGMENTS.map(seg => (
          <Card key={seg.id} selected={a.segment === seg.id} onClick={() => set("segment", seg.id)} label={`${seg.icon}  ${seg.label}`} desc={seg.desc} />
        ))}
        {step === 0 && <p style={{ fontSize: 11, color: C.muted, fontFamily: f, fontStyle: "italic", textAlign: "center", marginTop: 12 }}>Nothing here is permanent. You can revisit any of this.</p>}
      </>
    )},
    // Q1: Career stage
    { valid: !!a.stage, btnText: "Keep going", render: () => (
      <>
        <h2 style={{ fontSize: 22, color: C.navy, fontFamily: s, fontWeight: 400, marginBottom: 6 }}>Where are you right now?</h2>
        <p style={{ fontSize: 13, color: C.light, fontFamily: f, marginBottom: 16, lineHeight: 1.5 }}>Different stages, different realities. We want to meet yours.</p>
        {stageOptions.map(st => (
          <Card key={st.id} selected={a.stage === st.id} onClick={() => set("stage", st.id)} label={st.label} desc={st.desc} />
        ))}
      </>
    )},
    // Q2: Financial authority
    { valid: !!a.authority, btnText: "Next", render: () => (
      <>
        <h2 style={{ fontSize: 22, color: C.navy, fontFamily: s, fontWeight: 400, marginBottom: 6 }}>Who helps manage your money?</h2>
        <p style={{ fontSize: 13, color: C.light, fontFamily: f, marginBottom: 16, lineHeight: 1.5 }}>No judgment. This shapes who has access to your StewardHouse account.</p>
        {AUTHORITY.map(auth => (
          <Card key={auth.id} selected={a.authority === auth.id} onClick={() => set("authority", auth.id)} label={auth.label} desc={auth.desc} />
        ))}
      </>
    )},
    // Q3: Causes
    { valid: a.causes.length > 0, btnText: "Lock these in", render: () => (
      <>
        <h2 style={{ fontSize: 22, color: C.navy, fontFamily: s, fontWeight: 400, marginBottom: 6 }}>Where do you want to make an impact?</h2>
        <p style={{ fontSize: 13, color: C.light, fontFamily: f, marginBottom: 16, lineHeight: 1.5 }}>Choose up to 3. These shape the organizations, lessons, and opportunities we surface for you.</p>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8, marginBottom: 12 }}>
          {CAUSES.map(c => {
            const sel = a.causes.includes(c.id);
            return <div key={c.id} onClick={() => tog("causes", c.id, 3)} style={{ padding: "12px 6px", borderRadius: 12, textAlign: "center", cursor: "pointer", border: `2px solid ${sel ? C.teal : C.border}`, background: sel ? C.tealLt : C.card, transition: "all 0.15s" }}>
              
              <span style={{ fontSize: 11, fontWeight: 500, fontFamily: f, display: "block", marginTop: 3 }}>{c.label}</span>
            </div>;
          })}
        </div>
      </>
    )},
    // Q4: Geography
    { valid: a.geo.length > 0 && (a.geo.every(id => !["hometown","current","state"].includes(id)) || a.geoDetail.trim().length > 0), btnText: "Set", render: () => (
      <>
        <h2 style={{ fontSize: 22, color: C.navy, fontFamily: s, fontWeight: 400, marginBottom: 6 }}>Where do you want your giving to land?</h2>
        <p style={{ fontSize: 13, color: C.light, fontFamily: f, marginBottom: 16, lineHeight: 1.5 }}>Select all that apply.</p>

        <p style={{ fontSize: 13, color: C.light, fontFamily: f, marginBottom: 16, lineHeight: 1.5 }}>The neighborhood. The people. The things you carry.</p>
        <textarea value={a.lived} onChange={e => set("lived", e.target.value)} placeholder="Even one sentence..." style={{ width: "100%", minHeight: 110, padding: 14, borderRadius: 12, border: `2px solid ${C.border}`, fontFamily: f, fontSize: 14, lineHeight: 1.6, color: C.text, resize: "vertical", outline: "none", boxSizing: "border-box", background: C.card }} />
        {a.lived.trim().length > 0 && <p style={{ fontSize: 12, color: C.sage, fontFamily: f, fontStyle: "italic", textAlign: "center", marginTop: 10 }}>That's your story. Everything builds on it.</p>}
      </>
    )},
    // Q6: Influence
    { valid: a.influence.trim().length > 0, btnText: "Go deeper", emotional: true, render: () => (
      <>
        <h2 style={{ fontSize: 22, color: C.navy, fontFamily: s, fontWeight: 400, marginBottom: 6 }}>Who taught you what generosity looks like?</h2>
        <p style={{ fontSize: 13, color: C.light, fontFamily: f, marginBottom: 16, lineHeight: 1.5 }}>A parent, coach, mentor. Or maybe nobody did — and that's why you're here.</p>
        <textarea value={a.influence} onChange={e => set("influence", e.target.value)} placeholder="Tell us about them — or the absence..." style={{ width: "100%", minHeight: 110, padding: 14, borderRadius: 12, border: `2px solid ${C.border}`, fontFamily: f, fontSize: 14, lineHeight: 1.6, color: C.text, resize: "vertical", outline: "none", boxSizing: "border-box", background: C.card }} />

    )},
    // Q7: Visibility
    { valid: !!a.visibility, btnText: "That\u2019s my preference", render: () => (

        <h2 style={{ fontSize: 22, color: C.navy, fontFamily: s, fontWeight: 400, marginBottom: 6 }}>How public do you want your giving to be?</h2>

          "Noted. This is a compass heading, not a contract."

    )},

          "Casting wide teaches you what resonates. You can always go deeper later."

      </>
    )},
    // Q11: Existing orgs
    { valid: a.existingOrgs.trim().length > 0, btnText: "Almost there", render: () => {
      const isFB = a.existingOrgs.includes("first step");

            <span style={{ fontSize: 14, fontWeight: 500, fontFamily: f, color: isFB ? C.teal : C.light }}>{isFB ? "✓ " : ""}I haven't given yet — this is my first step</span>
          </div>
        </>
      );
    }},
    // Q12: Legacy
    { valid: a.legacy.trim().length > 0, btnText: "Build my GPS", emotional: true, render: () => (
      <>
        <h2 style={{ fontSize: 22, color: C.navy, fontFamily: s, fontWeight: 400, marginBottom: 6 }}>When people talk about you 20 years from now, what do you want them to say?</h2>
        <p style={{ fontSize: 13, color: C.light, fontFamily: f, marginBottom: 16, lineHeight: 1.5 }}>The first thing that comes to mind is usually the truest.</p>
        <textarea value={a.legacy} onChange={e => set("legacy", e.target.value)} placeholder="Even one sentence..." style={{ width: "100%", minHeight: 120, padding: 14, borderRadius: 12, border: `2px solid ${C.border}`, fontFamily: f, fontSize: 14, lineHeight: 1.6, color: C.text, resize: "vertical", outline: "none", boxSizing: "border-box", background: C.card }} />
      </>
    )},
  ];

  const cur = steps[step];

  // Group transitions
  const groupBreaks = { 5: { text: "Now the real questions.", btn: "I\u2019m ready" }, 9: { text: "Almost there. The last few are about where you\u2019re headed.", btn: "Let\u2019s finish this" } };
  const [showBreak, setShowBreak] = useState(null);

  const next = () => {
    if (step < steps.length - 1) {
      if (groupBreaks[step + 1]) { setShowBreak(groupBreaks[step + 1]); }
      else { setStep(step + 1); }
    } else {
      try { localStorage.removeItem("sh_questions"); } catch(e) {}
      onComplete(a);
    }
  };

  if (showBreak) {
    return (
      <div style={{ textAlign: "center", paddingTop: 80 }}>
        <div style={{ width: 40, height: 1, background: C.teal, margin: "0 auto 20px" }} />
        <p style={{ fontSize: 17, color: C.navy, fontFamily: s, fontWeight: 400, lineHeight: 1.5, maxWidth: 300, margin: "0 auto 24px" }}>{showBreak.text}</p>
        <Btn onClick={() => { setShowBreak(null); setStep(step + 1); }}>{showBreak.btn}</Btn>
      </div>
    );
  }

  // Progress dots
  const dots = Array.from({ length: steps.length }, (_, i) => (
    <div key={i} style={{ width: i === step ? 16 : 5, height: 5, borderRadius: 3, background: i <= step ? C.teal : C.border, transition: "all 0.3s", opacity: i < step ? 0.5 : 1 }} />
  ));

  return (
    <Fade k={step}>
      <div style={{ paddingTop: 4 }}>
        {step > 0 && <div onClick={() => setStep(step - 1)} style={{ fontSize: 13, color: C.muted, fontFamily: f, cursor: "pointer", marginBottom: 6 }}>← Back</div>}
        {!cur.emotional && <div style={{ display: "flex", justifyContent: "center", gap: 4, margin: "10px 0 16px" }}>{dots}</div>}
        {cur.emotional && <div style={{ height: 26 }} />}
        {cur.render()}
        <Btn disabled={!cur.valid} onClick={next}>{cur.btnText || "Continue"}</Btn>
      </div>
    </Fade>
  );
}

// ─── DISCOVER / NONPROFIT SCREENER ───
function DiscoverScreen({ answers: a, onStartGPS }) {
  const [expanded, setExpanded] = useState(null);
  const [saved, setSaved] = useState([]);
  // Manual filters for browse mode (no GPS)
  const isGPSMode = a && a.causes && a.causes.length > 0;
  const [manualCauses, setManualCauses] = useState([]);
  const [manualGeo, setManualGeo] = useState("");

  const activeCauses = isGPSMode ? a.causes : manualCauses;
  const activeGeo = isGPSMode ? (a.geoDetail || "") : manualGeo;
  const hasFilters = activeCauses.length > 0;

  const toggleManualCause = (id) => {
    setManualCauses(prev => prev.includes(id) ? prev.filter(x => x !== id) : prev.length < 3 ? [...prev, id] : prev);
  };

  // Score and filter orgs
  const scoredOrgs = hasFilters ? ORGS.map(org => {
    let score = 0;
    const causeOverlap = org.causes.filter(c => activeCauses.includes(c));
    score += causeOverlap.length * 3;
    if (activeGeo && org.geo.toLowerCase().includes(activeGeo.split(",")[0].toLowerCase().trim())) score += 2;
    if (org.geo === "National") score += 1;
    if (org.geo === "International" && a?.geo?.includes("international")) score += 2;
    return { ...org, score, matchedCauses: causeOverlap };
  }).filter(o => o.score > 0).sort((x, y) => y.score - x.score) : [];

  // Group by category
  const grouped = { established: [], community: [], emerging: [] };
  scoredOrgs.forEach(o => { if (grouped[o.cat]) grouped[o.cat].push(o); });
  const hasResults = scoredOrgs.length > 0;

  const causeLabels = activeCauses.map(id => CAUSES.find(c => c.id === id)?.label).filter(Boolean);
  const toggleSave = (id) => setSaved(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);

  const trustLevel = a?.trust || "specific"; // default to showing detail

      <div style={{ background: C.card, borderRadius: 14, border: `1px solid ${C.border}`, marginBottom: 10, overflow: "hidden" }}>

        {/* GPS invitation banner for browse mode */}
        {!isGPSMode && (
          <>
            <p style={{ fontSize: 13, color: C.light, fontFamily: f, lineHeight: 1.5, marginBottom: 14 }}>
              You're free to explore — but these results aren't tailored to you yet. Complete your Giving Studio and we'll match organizations to your values, your geography, and the causes you care about.
            </p>
            <div onClick={onStartGPS} style={{
              background: C.tealLt, borderRadius: 12, padding: "16px 18px", marginBottom: 20,
              border: `1px solid ${C.teal}20`, cursor: "pointer",
              display: "flex", alignItems: "center", justifyContent: "space-between",
            }}>
              <div>
                <div style={{ fontSize: 14, fontWeight: 600, color: C.teal, fontFamily: f }}>Complete your Giving Studio</div>
                <div style={{ fontSize: 12, color: C.light, fontFamily: f, lineHeight: 1.4 }}>15 minutes. Personalized results on the other side.</div>

// ─── GIVING MODELER — personal projection ───
function GivingModeler({ budget }) {
  const budgetMap = {"Under $1,000":500,"$1K – $10K":5000,"$10K – $50K":25000,"$50K – $250K":100000,"$250K+":250000,"Not sure yet":2000};
  const defaultAmt = budgetMap[budget] || 5000;
  const [open, setOpen] = useState(false);
  const [mAmt, setMAmt] = useState(defaultAmt);
  const [mGrowth, setMGrowth] = useState(5);
  const [mGrant, setMGrant] = useState(Math.round(defaultAmt * 0.6));
  const [mYears, setMYears] = useState(20);
  const [mCareer, setMCareer] = useState(false);
  const [mCareerRate, setMCareerRate] = useState(4);

  const fmtK = n => { if(n===undefined||n===null||isNaN(n)) return "$0"; if(n>=1000000) return "$"+(n/1000000).toFixed(1)+"M"; if(n>=1000) return "$"+Math.round(n/1000)+"K"; return "$"+Math.round(n).toLocaleString(); };

  let fund = 0, totalIn = 0, totalOut = 0; const pts = [];
  for (let y = 1; y <= mYears; y++) {
    const contrib = mCareer ? Math.round(mAmt * Math.pow(1 + mCareerRate/100, y-1)) : mAmt;
    const growth = fund * mGrowth / 100;
    const grant = Math.min(mGrant, fund + contrib + growth);
    fund = fund + contrib + growth - grant;
    totalIn += contrib; totalOut += grant;
    pts.push({y:y, fund: Math.round(fund)});
  }
  const fin = pts.length > 0 ? pts[pts.length - 1] : {fund:0};
  const maxF = Math.max.apply(null, pts.map(function(p){return p.fund;})) || 1;

  const Sl = function(props) {
    return (
      <div style={{ marginBottom: 10 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 2 }}>
          <span style={{ fontSize: 12, color: C.navy, fontFamily: f }}>{props.label}</span>
          <span style={{ fontSize: 13, fontWeight: 600, color: C.teal }}>{props.fmt ? props.fmt(props.val) : props.val}</span>
        </div>
        <input type="range" min={props.min} max={props.max} step={props.step||1} value={props.val} onChange={function(e){props.onChange(Number(e.target.value));}} style={{ width: "100%", accentColor: C.teal, height: 4 }} />
      </div>
    );
  };

  if (!open) {
    return (
      <div onClick={function(){setOpen(true);}} style={{ background: C.card, borderRadius: 14, padding: "14px 18px", border: "1px solid "+C.border, marginBottom: 12, cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <div style={{ fontSize: 14, fontWeight: 500, color: C.navy, fontFamily: f }}>Your giving over time</div>
          <div style={{ fontSize: 12, color: C.light }}>{"See what " + budget + "/year becomes"}</div>
        </div>
        <span style={{ fontSize: 18, color: C.teal }}>{"\u2192"}</span>
      </div>
    );
  }

  return (
    <div style={{ background: C.card, borderRadius: 16, padding: "18px", border: "1px solid "+C.border, marginBottom: 12 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <div>
          <div style={{ fontSize: 10, color: C.bronze, fontFamily: f, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 2 }}>YOUR GIVING OVER TIME</div>
          <div style={{ fontSize: 12, color: C.light }}>Adjust anything. See what it becomes.</div>
        </div>
        <span onClick={function(){setOpen(false);}} style={{ fontSize: 12, color: C.muted, cursor: "pointer" }}>Close</span>
      </div>

      <div style={{ background: C.teal, borderRadius: 12, padding: "16px", marginBottom: 14, display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
        <div>
          <div style={{ fontSize: 10, color: "rgba(255,255,255,0.6)", letterSpacing: "0.08em", textTransform: "uppercase" }}>GIVING FUND AT YEAR {mYears}</div>
          <div style={{ fontSize: 28, fontWeight: 700, color: "#fff", fontFamily: f }}>{fmtK(fin.fund)}</div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontSize: 10, color: "rgba(255,255,255,0.6)" }}>Total given</div>
          <div style={{ fontSize: 18, fontWeight: 600, color: "rgba(255,255,255,0.9)" }}>{fmtK(totalOut)}</div>
        </div>
      </div>

      <div style={{ display: "flex", alignItems: "flex-end", gap: 1, height: 50, marginBottom: 12 }}>
        {pts.map(function(p,i) {
          return <div key={i} style={{ flex: 1, height: Math.max((p.fund/maxF)*45, 1)+"px", background: C.tealLt, borderRadius: 1 }} />;
        })}
      </div>

      <Sl label="I give each year" val={mAmt} onChange={function(v){setMAmt(v); setMGrant(Math.min(mGrant,v));}} min={100} max={100000} step={100} fmt={function(v){return "$"+Math.round(v).toLocaleString();}} />
      <Sl label="Fund grows at" val={mGrowth} onChange={setMGrowth} min={0} max={10} step={0.5} fmt={function(v){return v+"%";}} />
      <Sl label="I give from fund yearly" val={mGrant} onChange={setMGrant} min={0} max={Math.max(mAmt,1000)} step={100} fmt={function(v){return "$"+Math.round(v).toLocaleString();}} />
      <Sl label="How long I give" val={mYears} onChange={setMYears} min={5} max={40} fmt={function(v){return v+" years";}} />

      <div onClick={function(){setMCareer(!mCareer);}} style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", padding: "8px 0", marginBottom: mCareer ? 0 : 6 }}>
        <div style={{ width: 32, height: 18, borderRadius: 9, background: mCareer ? C.teal : C.border, transition: "background 0.2s", position: "relative" }}>
          <div style={{ width: 14, height: 14, borderRadius: "50%", background: "#fff", position: "absolute", top: 2, left: mCareer ? 16 : 2, transition: "left 0.2s" }} />
        </div>
        <span style={{ fontSize: 12, color: C.navy, fontFamily: f }}>My giving grows with my career</span>
      </div>
      {mCareer && <Sl label="Giving grows by" val={mCareerRate} onChange={setMCareerRate} min={1} max={10} fmt={function(v){return v+"%/yr";}} />}

      <div style={{ background: C.cream, borderRadius: 10, padding: "12px", marginTop: 4 }}>
        <div style={{ fontSize: 12, color: C.navy, fontFamily: f, lineHeight: 1.6 }}>
          {mGrowth > 0
            ? "If you contribute " + fmtK(mAmt) + "/year" + (mCareer ? " (growing "+mCareerRate+"%/yr)" : "") + " to a giving fund earning " + mGrowth + "%, and give " + fmtK(mGrant) + "/year to causes you care about \u2014 after " + mYears + " years you\u2019ll have given " + fmtK(totalOut) + " total with " + fmtK(fin.fund) + " still growing."
            : "If you give " + fmtK(mAmt) + "/year" + (mCareer ? " (growing "+mCareerRate+"%/yr)" : "") + " directly for " + mYears + " years, you\u2019ll have given " + fmtK(totalOut) + " total directed to causes that matter to you."
          }
        </div>
      </div>

      <div style={{ textAlign: "center", marginTop: 10 }}>
        <div style={{ fontSize: 11, color: C.muted, lineHeight: 1.5 }}>This is a planning illustration, not financial advice. Share your GPS with your financial advisor to explore what is right for your situation.</div>
      </div>
    </div>
  );
}

// ─── HOME SCREEN ───
function Home({ answers: a, givingStyle, gifts, onGive, onLearn, onGPS, onDiscover, onSummary, onFeedback }) {
  const [showHistory, setShowHistory] = useState(false);
  const total = gifts.reduce((s, g) => s + g.amount, 0);
  const orgCount = new Set(gifts.map(g => g.org)).size;
  const causeLabels = a.causes.map(id => CAUSES.find(c => c.id === id)).filter(Boolean);
  const hasGifts = gifts.length > 0;
  const isFirst = a.existingOrgs?.includes("first step") || a.existingOrgs?.includes("haven't given");
  const hasBudget = a.budget && !a.budget.includes("not sure") && !a.budget.includes("unsure") && !a.budget.includes("Not sure");
  const readyToAct = hasBudget && !isFirst;
  const theme = SEGMENT_THEMES[a.segment] || SEGMENT_THEMES.other;

  // Build contextual path suggestions — always multiple, never a single directive
  const paths = [];

  // REFLECT path — always available
  if (!hasGifts) {
    paths.push({ icon: "", title: "Sit with your GPS", desc: "You built your compass. Read it, share it, or just let it settle.", action: onGPS, color: C.cream });

    paths.push({ icon: "", title: "See your giving picture", desc: `$${total.toLocaleString()} given to ${orgCount} organization${orgCount !== 1 ? "s" : ""}. Here's where you are.`, action: onGPS, color: C.cream });
  }

  // LEARN path — always available
  paths.push({ icon: "", title: "Learn something new", desc: "A quick lesson on giving smarter. 2-3 minutes, no homework.", action: onLearn, color: C.goldLt });

  // ACT paths — contextual, only when signals suggest readiness
  if (!hasGifts && !isFirst) {
    // They listed existing orgs — they're already giving, just haven't logged
    paths.push({ icon: "", title: "Log a gift you've already made", desc: "Add the giving you mentioned so your record starts taking shape.", action: onGive, color: C.tealLt });

  if (readyToAct || hasGifts) {
    // They have budget set, or they've already given — they're ready to explore
    paths.push({ icon: "", title: "Explore organizations", desc: `See what's out there — matched to ${causeLabels[0]?.label || "what you care about"}.`, action: onDiscover, color: C.tealLt });
  }

  if (hasGifts) {
    paths.push({ icon: "", title: "Log another gift", desc: "10 seconds. Keep your giving record growing.", action: onGive, color: C.tealLt });
  }

  // Micro-learning content — segment-aware
  const seg = a.segment || "other";
  const microBySegment = {
    sports: !hasGifts
      ? "The average NFL career is 3.3 years. But a giving practice built during those years can shape communities for decades. The athletes remembered aren't just the ones who performed — they're the ones who showed up."
      : "Trust-based giving means letting organizations use your money where they know it's needed. The Ford Foundation has committed $2 billion to this approach through its BUILD initiative. You're in good company.",
    music: !hasGifts
      ? "Your art moves people. Your giving sustains the communities that made the art possible. You don't need a foundation or a six-figure check — you need intention."
      : "A $500 unrestricted gift lets an organization use it where it's needed most — keeping lights on, hiring staff, buying supplies. The things that keep community programs alive.",
    entertainment: !hasGifts
      ? "A $5,000 unrestricted gift to an organization you believe in does more than a $50,000 table at a gala where 80% goes to event production. Intention over optics."
      : "In survey after survey, nonprofit leaders say unrestricted funding is what they need most. It lets them respond to real needs, retain staff, and plan for the future. When you trust an organization, trust them with how the money is used too.",
    creator: !hasGifts
      ? "You built your audience from nothing — through consistency, authenticity, and showing up every day. Build your giving practice the same way. Start small. Be consistent. Let it grow."
      : "When you share your giving practice with your audience, you're not just donating — you're giving others permission to start their own practice. That's the multiplier effect.",
    other: !hasGifts
      ? "Philanthropy comes from the Greek philanthropia — 'love of humanity.' You don't need a foundation or a six-figure check. You need intention. You have that now."
      : "The organizations doing the hardest work are often the least funded. Your giving — guided by your GPS — reaches places that big philanthropy overlooks. That's not a consolation. That's the point.",
  };
  const microContent = microBySegment[seg] || microBySegment.other;

  // Visibility-aware insight
  const visInsight = a.visibility === "public"
    ? { icon: "", title: "Your platform amplifies giving", text: "When you share your giving publicly, you inspire others to give too. Share the cause — why it matters to you, who the organization serves, and what drew you to them. That story does more than a dollar amount ever could. And it opens doors: board invitations, speaking opportunities, and funder introductions for the organizations you support.", color: C.goldLt }
    : a.visibility === "selective"
    ? { icon: "", title: "Sharing on your terms", text: "You choose when and how to share your giving. When you do share, focus on the cause, not the check. Tell people why you care — the personal connection, the mission, the community. You control the narrative. What you share can inspire others. What you keep private stays private.", color: C.cream }
    : { icon: "", title: "Your giving stays yours", text: "Private giving is powerful. Most DAF providers let you give anonymously — the organization receives the gift without knowing your name. For personal gifts under $250, no public record exists. Your privacy is protected by default. If anyone asks, your GPS gives you language: 'I have a giving practice — it's personal.'", color: C.cream };

  return (
    <Fade k="home">
      <div style={{ paddingTop: 4, paddingBottom: 40 }}>
        {/* Identity anchor */}
        <div style={{ background: C.card, borderRadius: 16, padding: "20px 18px", border: `1px solid ${C.border}`, marginBottom: 12 }}>

          {givingStyle && <div style={{ display: "inline-block", padding: "5px 14px", borderRadius: 50, background: theme.accentLt, fontSize: 12, fontWeight: 600, color: theme.accent, fontFamily: f, marginBottom: 10 }}>{givingStyle}</div>}
          <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 8 }}>
            {causeLabels.map(c => <Tag key={c.id} text={c.label} />)}
          </div>
          {a.geoDetail && <div style={{ fontSize: 12, color: C.light, fontFamily: f }}>{a.geoDetail}</div>}
        </div>

        {/* Living pulse — always visible */}
        <div style={{ display: "grid", gridTemplateColumns: hasGifts ? "1fr 1fr 1fr" : "1fr", gap: 8, marginBottom: 4 }}>
          {hasGifts ? <>
            <div style={{ background: theme.accent, borderRadius: 14, padding: "14px 12px" }}>
              <div style={{ fontSize: 22, fontWeight: 700, fontFamily: f, color: "#fff" }}>${total.toLocaleString()}</div>
              <div style={{ fontSize: 10, color: "rgba(255,255,255,0.7)", marginTop: 2 }}>Given this year</div>

              <div style={{ fontSize: 11, color: C.light, marginTop: 2 }}>Organization{orgCount !== 1 ? "s" : ""}</div>

            <div style={{ background: C.card, borderRadius: 14, padding: "14px 12px", border: `1px solid ${C.border}` }}>
              <div style={{ fontSize: 22, fontWeight: 700, fontFamily: f, color: C.navy }}>{gifts.length}</div>
              <div style={{ fontSize: 11, color: C.light, marginTop: 2 }}>Gift{gifts.length !== 1 ? "s" : ""} logged</div>
            </div>
          </> : (
            <div style={{ background: C.card, borderRadius: 14, padding: "18px 16px", border: `1px solid ${C.border}`, textAlign: "center" }}>

        <div onClick={onSummary} style={{ textAlign: "center", cursor: "pointer", marginBottom: 12, padding: "6px 0" }}>

        {/* Intention — show budget if they set one */}
        {hasBudget && (

            <div style={{ fontSize: 13, fontFamily: f, color: C.text }}><span style={{ fontWeight: 600 }}>My intention:</span> {a.budget}</div>
          </div>
        )}

                {/* ─── YOUR GIVING OVER TIME — personal projection modeler ─── */}
        {hasBudget && <GivingModeler budget={a.budget} />}

        {/* Giving history */}
        {hasGifts && <>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: theme.accent, fontFamily: f, textTransform: "uppercase", letterSpacing: "0.08em" }}>Giving history</div>
            {gifts.length > 3 && <span onClick={() => setShowHistory(!showHistory)} style={{ fontSize: 12, color: C.teal, fontFamily: f, cursor: "pointer" }}>{showHistory ? "Show less" : `View all ${gifts.length}`}</span>}
          </div>
          {(showHistory ? gifts : gifts.slice(0, 3)).map(g => (
            <div key={g.id} style={{ background: C.card, borderRadius: 12, padding: "12px 14px", border: `1px solid ${C.border}`, marginBottom: 6, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontSize: 14, fontWeight: 600, color: C.navy, fontFamily: f }}>{g.org}</div>
                <div style={{ fontSize: 11, color: C.muted, fontFamily: f }}>{g.date}{g.type && g.type !== "unrestricted" ? ` · ${g.type}` : ""}{g.vehicle && g.vehicle !== "personal" ? ` · ${g.vehicle === "daf" ? "DAF" : "Community Foundation"}` : ""}{g.recurring ? " · Recurring" : ""}</div>
              </div>
              <div style={{ fontSize: 15, fontWeight: 700, color: C.teal, fontFamily: f }}>${g.amount.toLocaleString()}</div>

        {/* ─── PATHS FORWARD — suggest, don't prescribe ─── */}
        <div style={{ marginTop: hasGifts ? 16 : 4 }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: C.navy, fontFamily: f, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 10 }}>When you're ready</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {paths.map((p, i) => (
              <div key={i} onClick={p.action} style={{
                background: p.color || C.card, borderRadius: 14, padding: "16px 18px",
                border: `1px solid ${C.border}`, cursor: "pointer",

            <div style={{ fontSize: 11, fontWeight: 600, color: C.gold, fontFamily: f, textTransform: "uppercase", letterSpacing: "0.06em" }}>Funding spotlight</div>

              : a.causes?.includes("arts")
              ? "According to the DeVos Institute of Arts Management, arts organizations led by people of color operate on significantly smaller budgets than their peers — despite serving diverse audiences. Consistent support from individual donors is often their most reliable funding."
              : a.causes?.includes("health")
              ? "The Robert Wood Johnson Foundation has documented that community health organizations in underserved neighborhoods are disproportionately affected by funding cuts during economic downturns. Unrestricted support helps them stay open when other funding disappears."

          </div>
          <div style={{ fontSize: 11, color: C.muted, fontFamily: f, fontStyle: "italic", marginTop: 6 }}>
            {a.causes?.includes("education")
              ? <span>Source: <a href="https://www.ncrp.org/publications" target="_blank" rel="noopener noreferrer" style={{ color: C.teal, textDecoration: "underline" }}>NCRP, "Responsive Philanthropy" reports</a></span>
              : a.causes?.includes("arts")
              ? <span>Source: <a href="https://www.devosinstitute.umd.edu/" target="_blank" rel="noopener noreferrer" style={{ color: C.teal, textDecoration: "underline" }}>DeVos Institute of Arts Management research</a></span>
              : a.causes?.includes("health")
              ? <span>Source: <a href="https://www.rwjf.org/en/insights.html" target="_blank" rel="noopener noreferrer" style={{ color: C.teal, textDecoration: "underline" }}>Robert Wood Johnson Foundation reports</a></span>
              : <span>Sources: <a href="https://www.bridgespan.org/insights/overcoming-the-racial-bias-in-philanthropic-funding" target="_blank" rel="noopener noreferrer" style={{ color: C.teal, textDecoration: "underline" }}>Echoing Green & Bridgespan, "Overcoming the Racial Bias in Philanthropic Funding"</a></span>}
          </div>
        </div>

        {/* Feedback */}
        <div onClick={onFeedback} style={{ background: C.card, borderRadius: 12, padding: "14px 16px", marginTop: 14, border: `1px solid ${C.border}`, cursor: "pointer", display: "flex", alignItems: "center", gap: 10 }}>
          
          <div>
            <div style={{ fontSize: 13, fontWeight: 600, color: C.navy, fontFamily: f }}>Share feedback</div>
            <div style={{ fontSize: 11, color: C.muted, fontFamily: f }}>Help us build StewardHouse right — takes 2 minutes</div>
          </div>
        </div>

        {/* Gentle close */}
        <div style={{ textAlign: "center", marginTop: 20 }}>
          <div style={{ fontSize: 13, color: C.muted, fontFamily: f, fontStyle: "italic" }}>No rush. Your GPS is here whenever you need it.</div>
        </div>
      </div>
    </Fade>
  );
}

// ─── ANNUAL GIVING SUMMARY ───
function GivingSummary({ gifts, answers: a, onBack }) {
  const theme = SEGMENT_THEMES[a?.segment] || SEGMENT_THEMES.other;
  const total = gifts.reduce((s, g) => s + g.amount, 0);
  const orgCount = new Set(gifts.map(g => g.org)).size;
  const avgGift = gifts.length > 0 ? Math.round(total / gifts.length) : 0;
  const unrestricted = gifts.filter(g => g.type === "unrestricted" || !g.type);
  const unrPct = gifts.length > 0 ? Math.round((unrestricted.length / gifts.length) * 100) : 0;
  const recurring = gifts.filter(g => g.recurring);

  // By org
  const byOrg = {};
  gifts.forEach(g => { byOrg[g.org] = (byOrg[g.org] || 0) + g.amount; });
  const orgList = Object.entries(byOrg).sort((a, b) => b[1] - a[1]);

  // By vehicle
  const byVehicle = {};
  gifts.forEach(g => { const v = g.vehicle === "daf" ? "DAF" : g.vehicle === "community" ? "Community Foundation" : "Personal"; byVehicle[v] = (byVehicle[v] || 0) + g.amount; });

  // By cause
  const causeLabels = (a?.causes || []).map(id => CAUSES.find(c => c.id === id)?.label).filter(Boolean);

  // Empty state
  if (gifts.length === 0) {
    return (
      <Fade k="summary-empty">
        <div style={{ paddingTop: 8, paddingBottom: 40 }}>
          <div onClick={onBack} style={{ fontSize: 13, color: C.light, fontFamily: f, cursor: "pointer", marginBottom: 12 }}>← Back</div>
          <div style={{ fontSize: 11, color: theme.accent, fontFamily: f, textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 600, marginBottom: 4 }}>My Giving Journey</div>
          <h1 style={{ fontSize: 24, color: C.navy, fontFamily: s, fontWeight: 400, marginBottom: 20 }}>2026 Year in Review</h1>
          <div style={{ textAlign: "center", paddingTop: 30 }}>
            <div style={{ fontSize: 18, fontFamily: s, color: C.teal, marginBottom: 14 }}>GPS</div>
            <div style={{ fontSize: 16, fontWeight: 600, color: C.navy, fontFamily: f, marginBottom: 8 }}>Your story hasn't started yet</div>
            <div style={{ fontSize: 14, color: C.light, fontFamily: f, lineHeight: 1.6, maxWidth: 300, margin: "0 auto", marginBottom: 20 }}>When you log your first gift, this page becomes your giving record — totals by organization, by vehicle, and a reflection on your year.</div>
            <div style={{ background: C.cream, borderRadius: 12, padding: "14px 16px", marginTop: 12 }}>
              <div style={{ fontSize: 13, fontFamily: f, color: C.text, lineHeight: 1.6 }}>
                <span style={{ fontWeight: 600, color: C.navy }}>What you'll see here:</span> total given (current year and all-time), organizations supported, unrestricted vs. directed breakdown, giving by vehicle (Personal, DAF, Community Foundation), and a reflection on how your giving aligns with your GPS.
              </div>
            </div>
          </div>
        </div>
      </Fade>
    );
  }

  return (
    <Fade k="summary">
      <div style={{ paddingTop: 8, paddingBottom: 40 }}>
        <div onClick={onBack} style={{ fontSize: 13, color: C.light, fontFamily: f, cursor: "pointer", marginBottom: 12 }}>← Back</div>
        <div style={{ fontSize: 11, color: theme.accent, fontFamily: f, textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 600, marginBottom: 4 }}>My Giving Journey</div>

// ─── GIFT LOGGING (enhanced) ───
function GiveScreen({ gifts, setGifts, onBack }) {
  const [org, setOrg] = useState("");
  const [amt, setAmt] = useState("");
  const [showMore, setShowMore] = useState(false);
  const [type, setType] = useState("unrestricted");
  const [vehicle, setVehicle] = useState("personal");
  const [notes, setNotes] = useState("");
  const [recurring, setRecurring] = useState(false);
  const [done, setDone] = useState(false);

  if (done) return (
    <Fade k="celeb"><div style={{ textAlign: "center", paddingTop: 60 }}>
      <div style={{ fontFamily: s, fontSize: 24, color: C.teal, marginBottom: 12 }}>Gift logged</div>
      <h2 style={{ fontSize: 20, color: C.navy, fontFamily: s, fontWeight: 400 }}>Added to your giving story</h2>
    </div></Fade>
  );

  return (
    <Fade k="give">
      <div style={{ paddingTop: 8, paddingBottom: 40 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 14 }}>
          <div style={{ fontSize: 11, color: C.teal, fontFamily: f, textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 600 }}>Log a gift</div>
          <span style={{ fontSize: 13, color: C.muted, fontFamily: f, cursor: "pointer" }} onClick={onBack}>Cancel</span>
        </div>

        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: C.navy, fontFamily: f, marginBottom: 4 }}>Who did you give to?</div>
          <input value={org} onChange={e => setOrg(e.target.value)} placeholder="Organization name" autoFocus style={{ width: "100%", padding: "13px", borderRadius: 12, border: `2px solid ${C.border}`, fontSize: 15, fontFamily: f, outline: "none", boxSizing: "border-box", background: C.card }} />
        </div>

        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: C.navy, fontFamily: f, marginBottom: 4 }}>How much?</div>
          <input value={amt} onChange={e => setAmt(e.target.value)} placeholder="$" inputMode="decimal" style={{ width: "100%", padding: "13px", borderRadius: 12, border: `2px solid ${C.border}`, fontSize: 15, fontFamily: f, outline: "none", boxSizing: "border-box", background: C.card }} />
        </div>

        {!showMore && <p onClick={() => setShowMore(true)} style={{ fontSize: 13, color: C.teal, fontFamily: f, cursor: "pointer", marginBottom: 12 }}>+ Add more details</p>}

        {showMore && <>
          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: C.navy, fontFamily: f, marginBottom: 4 }}>Type</div>
            <div style={{ display: "flex", gap: 6 }}>
              <Chip selected={type === "unrestricted"} onClick={() => setType("unrestricted")} label="Unrestricted" />
              <Chip selected={type === "directed"} onClick={() => setType("directed")} label="Directed" />
            </div>
          </div>

          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: C.navy, fontFamily: f, marginBottom: 4 }}>Vehicle</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {[{id:"personal",l:"Personal"},{id:"daf",l:"DAF"},{id:"community",l:"Community Foundation"}].map(v =>
                <Chip key={v.id} selected={vehicle === v.id} onClick={() => setVehicle(v.id)} label={v.l} />
              )}
            </div>
          </div>

          <div onClick={() => setRecurring(!recurring)} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14, cursor: "pointer" }}>
            <div style={{ width: 22, height: 22, borderRadius: 6, border: `2px solid ${recurring ? C.teal : C.border}`, background: recurring ? C.tealLt : C.card, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, color: C.teal, transition: "all 0.15s" }}>{recurring ? "✓" : ""}</div>
            <div style={{ fontSize: 13, fontFamily: f, color: C.text }}>This is a recurring gift</div>
          </div>

          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: C.navy, fontFamily: f, marginBottom: 4 }}>Notes (optional)</div>
            <textarea value={notes} onChange={e => setNotes(e.target.value)} placeholder="Anything you want to remember about this gift..." style={{ width: "100%", minHeight: 70, padding: 12, borderRadius: 12, border: `2px solid ${C.border}`, fontSize: 14, fontFamily: f, lineHeight: 1.5, color: C.text, resize: "vertical", outline: "none", boxSizing: "border-box", background: C.card }} />
          </div>
        </>}

        <Btn disabled={!org.trim() || !amt.trim()} onClick={() => {
          const amount = parseFloat(amt.replace(/[^0-9.]/g, ""));
          if (isNaN(amount) || amount <= 0) return;
          const gift = { id: Date.now(), org: org.trim(), amount, type, vehicle, recurring, notes, date: new Date().toLocaleDateString("en-US", { month: "short", day: "numeric" }) };
          setGifts(prev => [gift, ...prev]);
          setDone(true);
          setTimeout(() => { setDone(false); setOrg(""); setAmt(""); setType("unrestricted"); setVehicle("personal"); setNotes(""); setRecurring(false); setShowMore(false); onBack(); }, 2200);
        }}>Log this gift</Btn>
      </div>
    </Fade>
  );
}

      { t: "The overhead myth", b: "For years, people judged nonprofits by their 'overhead ratio' — what percentage of their budget goes to administration vs. programs. Low overhead = good. High overhead = wasteful. Except that's wrong. Even Charity Navigator — the organization that popularized the overhead metric — has publicly said: stop using it. Here's why: an organization that pays its staff well, invests in technology, and trains its leaders will have higher overhead. It will also be more effective, more sustainable, and better at serving its community. An organization with 5% overhead is probably underpaying everyone and one bad month from closing." },

      { t: "Why this matters for you", b: "You chose to be visible in your giving. That's a powerful decision. When someone with a platform gives publicly, it does more than fund an organization — it signals to your audience, your peers, and your community that giving matters. But public giving comes with responsibility. Done right, it amplifies impact. Done carelessly, it looks performative." },
      { t: "What to share", b: "Share the cause, not the check. Tell people why you care — what personal connection drew you to this organization or issue. Share the organization's mission and the people they serve. Tag them. Link to their website. Let your audience see the work, not just your donation. The story of why you give is more powerful than the number." },
      { t: "What it does for the nonprofit", b: "When you publicly support an organization, you're doing something money can't buy: lending your credibility. Other funders notice. Grant reviewers see it. Potential volunteers discover the organization through you. Your public endorsement can open doors to foundation funding, corporate sponsorships, and board recruitment. One social media post can do more for an organization's visibility than a $10,000 gift done anonymously." },
      { t: "What it does for you", b: "Public giving creates opportunities you might not expect. Organizations may invite you to join their board — a chance to learn governance, build professional skills, and shape strategy. Other funders in the space notice your giving and may want to partner. Media covers your philanthropy, shaping your public story beyond your career. These aren't reasons to give — but they're real outcomes of giving visibly and consistently." },
      { t: "Protecting yourself", b: "Public giving attracts attention — including from people who want access to your money. Once you're known as a giver, solicitations increase. Use your GPS as your filter: if an ask doesn't match your cause areas, geography, and values, it's a no. Never give under pressure. Never give in response to guilt. And be cautious of organizations that approach you primarily because of your name rather than your alignment with their mission." },
      { t: "Performative vs. genuine", b: "The difference is simple: performative giving centers you. Genuine giving centers the cause. If your giving post is mostly about you — your generosity, your brand, your moment — that's performance. If it's mostly about the organization, the people they serve, and why the work matters — that's genuine. Your audience can tell the difference. So can the organizations." },
      { t: "Your practice", b: "Next time you give, share one thing about the organization — not about the gift. Their mission, a story from someone they've served, or a recent win they celebrated. Tag them. Let your audience discover something new. That's how public giving creates ripple effects that outlast any single donation." },
    ]},
    "selective": { title: "Sharing your giving on your terms", icon: "", time: "4 min", cards: [
      { t: "Your approach", b: "You share when it feels right. That's a thoughtful position — not everyone needs to know about your giving, but sometimes sharing creates value for both you and the cause. This lesson helps you think about when sharing makes sense and how to do it well." },
      { t: "When sharing helps", b: "There are moments when sharing your giving genuinely serves the cause: when an organization is doing a fundraising push and your public support encourages others to give, when you want to normalize giving in your peer group, when you're personally connected to the cause and your story can inspire others, or when the organization asks you to share. In these moments, visibility is a gift in itself." },
      { t: "When to keep it quiet", b: "Not every gift needs an announcement. Routine giving, deeply personal causes, and organizations that haven't asked you to go public — these are all fine to keep private. You're not being secretive. You're being intentional about when your voice adds value and when the gift speaks for itself." },
      { t: "How to share well", b: "When you do share: focus on the cause, not the amount. Tell people why you care. Tag the organization so your audience can find them. If you're comfortable, share how people can get involved — not just financially, but through volunteering or spreading awareness. Your endorsement is worth more than a dollar figure." },
      { t: "Your practice", b: "Before your next gift, ask yourself: would sharing this benefit the organization? If yes, share the cause. If no, let the gift stand on its own. Over time, you'll develop an instinct for when visibility serves the mission — and that instinct is your giving compass at work." },
    ]},
    "private": { title: "Giving privately — what you need to know", icon: "", time: "4 min", cards: [
      { t: "Your choice is valid", b: "You chose to give privately. That's not less generous than public giving — it's a different practice. Some of the most significant philanthropy in history has been anonymous. MacKenzie Scott gave away $17 billion before most people knew her name. Privacy is a legitimate, respected approach to giving." },
      { t: "How privacy works", b: "For personal gifts, your privacy is straightforward: you give, the organization knows, nobody else does. For gifts over $250, you'll receive an acknowledgment letter for tax purposes — this is between you, the organization, and the IRS. It's not public. For true anonymity, a donor-advised fund (DAF) lets you recommend grants without the organization ever knowing your name. The DAF provider sends the gift on your behalf." },
      { t: "When people find out", b: "If you give consistently, people may notice — especially if you're in a public-facing career. That's okay. Having a GPS gives you language for when it comes up: 'I have a giving practice — it's personal.' You don't owe anyone details. If someone asks how much you give or to whom, a simple 'that's private' is enough." },
      { t: "The quiet impact", b: "Private giving has an advantage that public giving doesn't: the relationship with the organization is purely about the work. There's no brand consideration, no audience calculation, no performative pressure. The organization receives your gift because you believe in their mission — and that's the whole story. Many nonprofit leaders say their most reliable, most trusted funders are the ones nobody knows about." },
      { t: "Your practice", b: "Keep giving quietly. StewardHouse tracks your gifts, generates your tax summaries, and manages your giving relationships — all without public disclosure. Your GPS is yours. Your giving record is yours. Your story is yours to tell, or not, whenever you choose." },
    ]},

  const segmentLessons = {
    sports: [
      { title: "When people ask you for money", icon: "", time: "5 min", cards: [
        { t: "It will happen", b: "Teammates, family, old friends, strangers at events, people in your DMs. As your career grows, so do the asks. That's not a bad thing — people see your success and think you can help. But without a plan, you'll give reactively, feel drained, and wonder where the money went. This lesson gives you the plan." },
        { t: "Why it feels hard", b: "Saying no to someone you care about feels personal. Your teammate needs help with rent. Your cousin has a business idea. Your old coach needs equipment for the program. Every ask comes wrapped in a relationship — and that makes it hard to evaluate objectively. But giving out of guilt or obligation isn't generosity. It's pressure. Real generosity comes from intention." },
        { t: "Your GPS is your shield", b: "This is why you built a Giving Policy Statement. When someone asks, you have a framework: Does this match my cause areas? My geography? My values? If yes — learn more, take your time, and decide intentionally. If no — you have your answer, and it's not personal. The GPS turns an emotional decision into a values-based one." },
        { t: "How to say yes well", b: "When you do give to someone who asks: give through the platform, not through cash or Venmo. Log the gift. Choose unrestricted if you trust them, or directed if you want specifics. Set expectations: 'I'm happy to support this. Here's what I can do. I'd love to hear how it goes.' That's a giving relationship, not a handout." },
        { t: "How to say no with respect", b: "'I have a giving policy that guides my decisions. This doesn't fit right now, but I appreciate you sharing it with me.' That's the whole script. You don't owe an explanation. You don't need to justify your causes or your budget. A clear, kind no protects both the relationship and your practice." },
        { t: "The redirect", b: "Sometimes the best response isn't yes or no — it's a redirect. 'I can't fund this, but have you looked into [relevant organization]?' or 'I know someone who supports this kind of work — let me connect you.' You're still helping. You're just not writing a check for something that doesn't align with your compass." },
        { t: "Building the boundary", b: "The first time you say no is the hardest. The second is easier. By the fifth, people around you understand: you give intentionally, not reactively. That reputation protects you. Over time, the asks that reach you will be better aligned — because people know what you care about. Your GPS becomes public knowledge, and that's a good thing." },
      ]},
      { title: "Your career is short. Your giving is long.", icon: "", time: "5 min", cards: [
        { t: "The math nobody talks about", b: "Average NFL career: 3.3 years. Average NBA career: 4.5 years. Average WNBA career: 5 years. Average MLS career: 3.2 years. Your peak earning window is one of the shortest of any profession. But a giving practice built during those years can shape communities for decades. The career ends. The impact doesn't have to." },
        { t: "Phase 1: Before the money", b: "Collegiate, pre-draft, NIL. This is when you build habits, not portfolios. Give $50 to something you care about. Learn what unrestricted means. Read your GPS. The amount doesn't matter — the practice does. A $50 gift made intentionally at 19 teaches you more about philanthropy than a $50,000 gift made reactively at 25." },
        { t: "Phase 2: First real money", b: "Signing bonus. Rookie contract. NIL deals adding up. This is when the asks start — and when most athletes make their first giving mistakes. The signing bonus feels massive. Everyone around you has ideas for it. Your GPS keeps you grounded: these are my causes, this is my geography, this is my budget. Stick to the plan. A DAF (charitable savings account) is worth understanding now — contribute in high-income years, give from it over time." },
        { t: "Phase 3: Peak earning", b: "You're established. The money is real and consistent. This is when your giving can scale — multi-year commitments, larger unrestricted gifts, maybe a community foundation partnership. The organizations you've been supporting for 2-3 years now know you. You know them. The relationship is deep enough for real conversation: what do you actually need? How can I help beyond money?" },
        { t: "Phase 4: Transition", b: "The career is winding down. Maybe you're moving to broadcasting, coaching, business. Everything changes — your schedule, your income, your identity. But your giving practice doesn't have to. If you funded a DAF during peak earning, those dollars are still working. If you built relationships with organizations, those relationships outlast your roster spot. Your giving practice is the thing that doesn't change when everything else does." },
        { t: "The identity shift", b: "Athletes who transition successfully often say the hardest part isn't the money — it's the identity. You go from being 'the player' to being... what? Giving provides an answer. You're the person who showed up for your community before, during, and after the career. That's an identity nobody can take from you. It doesn't depend on a contract or a roster." },
        { t: "Start now", b: "Wherever you are in your career — collegiate, rookie, prime, transition — the best time to start a giving practice is today. Not when you have more money. Not when you have more time. Not when you 'figure it out.' Now. Open your GPS. Look at your causes. Find one organization. Give something. Log it. That's your foundation. Everything else builds from here." },
      ]},
      { title: "What is a foundation, really?", icon: "", time: "5 min", cards: [
        { t: "Why this comes up", b: "At some point in your career, someone might mention starting a foundation. Maybe it's an advisor, maybe it's a family member, maybe you saw someone in your field do it. The word sounds important — official, legacy-building, serious. But most people don't actually know what a foundation is, what it costs, or whether it makes sense for them. This lesson breaks it down." },
        { t: "What it actually is", b: "A private foundation is a separate legal organization — like a small company — that you create for charitable purposes. It has its own tax ID, its own bank account, and its own legal obligations. You put money in, and the foundation gives it out as grants. You control the decisions. But you also carry the responsibility: annual IRS filings, a board of directors, required financial disclosures, and a legal mandate to give out at least 5% of its assets every year." },
        { t: "What it costs", b: "Setting up a foundation costs $5,000-$25,000 in legal fees. Running one costs significantly more — $50,000-$200,000+ per year in staff, administration, accounting, legal, and compliance, depending on the size of the endowment. And that's before a single grant dollar goes out. On top of operating costs, the IRS requires private foundations to distribute at least 5% of their total assets annually as grants. On a $10 million endowment, that's $500,000 per year in mandatory grantmaking. Foundations make financial sense when you're giving at a scale where the tax benefits and control outweigh these substantial operating costs — usually $250,000+/year in giving." },
        { t: "What it's not", b: "A foundation is not a sports camp. It's not a charity event. It's not a brand. Running a basketball camp for kids is great — but you don't need a foundation to do it. You can sponsor events, partner with existing organizations, or give directly through personal giving or a DAF. A foundation is a vehicle for sustained, large-scale grantmaking. If that's not what you need right now, there are simpler paths that get your money to communities faster." },
        { t: "The simpler options", b: "A donor-advised fund (DAF) gives you most of what a foundation offers — tax benefits, strategic timing, a named fund — without the legal complexity. You don't need a board, you don't file with the IRS, and the provider handles the administration. A community foundation is even more hands-on: they know local organizations, facilitate introductions, and can advise you on where your giving will have the most impact. Both are legitimate, respected giving vehicles used by major philanthropists." },
        { t: "When a foundation makes sense", b: "A foundation might be right for you if: you're consistently giving $250,000+ per year, you want to involve your family in giving decisions across generations, you want to hire staff dedicated to your philanthropic work, you want full control over investment strategy and grantmaking, or you want to build an institution that outlasts your career. If none of those apply right now, a DAF or personal giving is probably the better fit — and you can always start a foundation later when the time is right." },
        { t: "The bottom line", b: "There's no rush to figure this out. A foundation is one option among many — and it's usually not the first step. Start by giving directly. Build relationships with organizations. Learn what kind of giver you are. If you eventually reach a point where you want more control, more scale, and more structure — that's when the foundation conversation makes sense. And when it does, bring in an attorney and a philanthropic advisor who can help you build it right. For a side-by-side comparison of all giving vehicles — personal, DAF, community foundation, and private foundation — check the Giving Vehicles Guide in the Learn tab." },
      ]},

    music: [
      { title: "When everyone wants a piece", icon: "", time: "5 min", cards: [
        { t: "The industry pressure", b: "Label charity events. A producer asking you to back a project. Friends from before you made it who need help. The music industry runs on relationships — and that makes saying no feel personal. But there's a difference between supporting your community and being everyone's ATM." },
        { t: "The pattern", b: "Here's what usually happens: you start earning, the asks start coming, you say yes to everything because you feel grateful and guilty, you burn through money on things that don't align with what you care about, and a year later you have nothing to show for your generosity. No relationships built. No impact tracked. No story to tell. Just receipts." },
        { t: "Your GPS is your filter", b: "When someone brings you an opportunity, check it against your values. Does it align with your cause areas? Your community? If it's just about proximity to your name — someone wanting your money because you're visible, not because you care about their cause — that's not philanthropy. It's extraction. Your GPS helps you tell the difference." },
        { t: "Industry events vs. real giving", b: "You'll be invited to charity galas, benefit concerts, and industry fundraisers. Some are genuine. Some are networking events with a charitable wrapper. Before you commit your time, money, or name: Who benefits? What percentage of the money raised goes to the cause? Would you support this organization even without the event? If you can't answer those questions, it's okay to skip it." },
        { t: "Setting boundaries", b: "'I give through a plan that I've built with intention. If this organization fits, I'd love to learn more. If not, I have to stay true to my compass.' That's professional, not cold. The people who respect that boundary are the ones worth keeping in your circle. The ones who push back are telling you something about their priorities." },
        { t: "Giving from your art", b: "Not every contribution has to be money. A feature on a benefit track. A shoutout on social. Playing at an event for an organization you believe in. These contributions have real value — sometimes more than a check. But they should still align with your GPS. Your art is your asset. Protect it the same way you protect your money." },
        { t: "Your practice", b: "Before your next industry ask, pause. Pull up your GPS. Check the alignment. If it fits — engage on your terms. If it doesn't — use the script: 'I have a giving plan. This doesn't fit right now.' Then move on without guilt. Every no that's aligned with your values makes the next yes more powerful." },

      { title: "Royalties and giving — making it work", icon: "", time: "5 min", cards: [
        { t: "The income problem", b: "One year you earn $500K. The next year, $80K. Traditional giving advice assumes steady income — save 10%, give 2%, invest the rest. But your income isn't steady. It spikes with a release, a tour, a sync placement — then drops. That unpredictability makes most giving advice useless for you. But it doesn't make giving impossible. It just requires a different approach." },
        { t: "Percentage, not dollar amount", b: "Instead of committing to '$5,000 this year,' commit to '2% of whatever I earn.' In a $500K year, that's $10,000. In an $80K year, that's $1,600. Both are real, meaningful gifts. The habit stays constant even when the income doesn't. And the organizations you support understand — consistency matters more than size." },
        { t: "The DAF solution", b: "In a high-income year, contribute to a donor-advised fund — a charitable savings account managed by a provider like Fidelity Charitable or your local community foundation. You get the tax deduction NOW, in the year you need it most. Then recommend grants from the fund in leaner years. Your giving stays consistent. Your tax benefit is optimized. The money grows tax-free while you decide where it goes. Nearly 400,000 donors gave $18B+ through DAFs last year. The average grant was $5,801. This isn't a niche tool — it's how serious givers operate." },
        { t: "Royalties as a giving stream", b: "Here's something most artists don't think about: royalties are recurring passive income. They're perfect for funding recurring giving commitments. If your catalog generates $2,000/month, committing $100/month to an organization you believe in is sustainable, predictable, and meaningful. You're not dipping into savings. You're redirecting a fraction of passive income toward your values." },
        { t: "Sync and advance windfalls", b: "A sync placement or an advance is a lump sum — and a tax event. These are ideal DAF moments. Contribute a portion to your DAF, take the deduction against that income, and distribute the grants over the next 1-2 years. You've turned a windfall into sustained giving without disrupting your cash flow. Ask your CPA: 'Should I contribute to a DAF this year given this income event?'" },
        { t: "What to tell your CPA", b: "Musicians need a CPA who understands variable income. Before your next meeting, share your Advisor Brief from the Giving Vehicles Guide. Then ask three questions: (1) Given my income pattern, should I open a DAF? (2) Should I contribute appreciated assets instead of cash? Over 69% of DAF contributions are non-cash assets — contributing stock or other investments directly avoids capital gains tax entirely. (3) What's the optimal month to make charitable contributions based on my projected income? Your CPA handles the numbers. You handle the values." },
        { t: "Your practice", b: "Pick your percentage. Even 1% is a start. Set it against all income — royalties, advances, sync, touring. In a big year, the giving is bigger. In a quiet year, it's smaller. The practice stays the same. Log every gift in StewardHouse. At the end of the year, your Giving Journey shows the full picture — and your CPA has everything they need." },
      ]},
      { title: "Building a legacy beyond the catalog", icon: "", time: "5 min", cards: [
        { t: "The catalog paradox", b: "Your music lives forever on streaming platforms. But streaming revenue depreciates — what earns $10,000/month today might earn $2,000/month in five years as listening habits shift. The catalog is an asset, but it's a declining one. A legacy built on giving doesn't depreciate. A scholarship you funded, a community center you supported, a program you sustained — those compound." },
        { t: "What legacy actually means", b: "Legacy isn't a building with your name on it. It's what people say about you when you're not in the room — and what exists because you showed up. The musician remembered 30 years from now isn't just the one with the hits. It's the one who used those hits to fund something that mattered. Your art opened doors. Your giving keeps them open." },
        { t: "The connection to your art", b: "Your art comes from somewhere — a neighborhood, a community, a struggle, a joy. Your giving can sustain the places and people that made the art possible. The school that had the music program. The community center where you first performed. The teacher who saw something in you. Giving back to those roots isn't obligation — it's completion. The art came FROM them. The giving goes BACK to them." },
        { t: "Small and consistent beats big and sporadic", b: "A $1,000 unrestricted gift every year for 10 years builds a deeper relationship than a $10,000 gift once. The organization plans around your support. They invite you to see the work. They introduce you to the people who benefit. Consistency creates trust. Trust creates impact. Impact creates legacy." },
        { t: "Involving your community", b: "You have fans who care about what you care about. When you share your giving practice — not the amount, but the values — you give them permission to join. A benefit track. A merch collaboration with a nonprofit. A message to your audience: 'This organization does work that matters to me. Check them out.' Your platform turns individual giving into collective action." },
        { t: "When to think bigger", b: "If your giving grows beyond $25K/year, you might start thinking about structure: a named fund at a community foundation, a multi-year commitment, or eventually a foundation. But don't rush to that. Build the relationships first. Know the organizations. Understand the work. The structure serves the values — not the other way around. The Giving Vehicles Guide has the full breakdown." },
        { t: "Start now", b: "You don't need a legacy plan at 25. You need a practice. Give to what matters to you. Be consistent. Let the organizations you support become part of your story. The legacy forms on its own — not because you planned it, but because you showed up. Every gift you log in StewardHouse is a line in that story." },
      ]},
