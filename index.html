    entertainment: [
      { title: "The gala circuit — showing up vs. giving", icon: "", time: "5 min", cards: [
        { t: "The trap", b: "You attend 15 galas a year. Your face is in the photos. People assume you're a major donor. But showing up isn't the same as giving — and the organizations know the difference. Attendance is visibility. Giving is commitment. The gala circuit can make you feel philanthropic without actually being philanthropic." },
        { t: "The economics", b: "Most charity galas spend 40-80% of revenue on event production — the venue, the catering, the entertainment, the silent auction logistics. A $50,000 table might put $10,000-$30,000 toward the actual mission. Compare that to a $10,000 unrestricted gift made directly — 100% goes to the work. The math is clear." },
        { t: "When galas make sense", b: "Galas aren't always a waste. They serve real purposes: they introduce you to organizations you might not have found otherwise, they build community among givers, and they generate visibility for causes. The question isn't 'should I attend' — it's 'should this be my primary way of giving?' The answer is almost always no." },
        { t: "The shift", b: "Pick 2-3 causes from your GPS. Give to them directly, consistently, and intentionally — outside of events. If a gala aligns with your causes, attend and enjoy it. But don't count the ticket price as your philanthropy for the year. The gala is the social event. The direct gift is the giving." },
        { t: "Saying no to events", b: "You'll be invited to more events than you can attend. Every invitation feels like an obligation. It's not. 'I appreciate the invitation, but I'm focusing my giving on [your cause areas] this year' is a complete sentence. The organizations worth supporting will respect that. The ones that pressure you are selling tickets, not building relationships." },
        { t: "Building real relationships", b: "The best thing you can do at a gala is meet the people who run the organization — not the event planners, but the ED, the program directors, the board members. Ask them: 'What's your biggest challenge right now?' If their answer resonates, follow up with a direct gift and a meeting. That's how a gala becomes a relationship instead of a photo op." },
        { t: "Your practice", b: "Before your next gala invitation, ask yourself three questions: Is this organization aligned with my GPS? Would I give to them even without the event? Do I want to build a relationship with their leadership? If the answer to all three is yes — go, connect, give. If not — skip it and redirect that money to an organization that does align." },
      ]},
      { title: "Using your name wisely", icon: "", time: "5 min", cards: [
        { t: "Your name is currency", b: "Every organization wants your endorsement. A photo, a quote, a social post, an appearance. Your name on their materials opens doors — to other funders, to media, to credibility. That's real value. But lending your name to a cause you don't understand is a risk — to them and to you. An endorsement that doesn't hold up under scrutiny damages both reputations." },
        { t: "The vetting question", b: "Before attaching your name to any organization, ask four questions: Do I understand what they do? Have I talked to someone who leads it? Would I give my own money? Do they reflect the community they claim to serve? If any answer is no, your name shouldn't be on it — no matter how good the event looks or how strong the relationship is with the person who asked." },
        { t: "The difference between endorsement and engagement", b: "An endorsement is a photo and a quote. Engagement is showing up for the work. Visiting the program. Meeting the staff. Understanding the challenges. When you go deep with an organization, your public support carries weight because people can tell it's real. An endorsement without engagement is a logo. Engagement without endorsement is still impact. The best is both together." },
        { t: "What your name does for a nonprofit", b: "When you publicly support an organization, you're not just adding a name to a letterhead. You're signaling to other funders: this organization is worth paying attention to. Foundation program officers notice. Corporate sponsors take meetings. Board members recruit from your network. One genuine public endorsement can catalyze $100,000+ in additional support from people who trust your judgment." },
        { t: "What it does for you", b: "Strategic public giving shapes your narrative. The media tells a story about every public figure — and you have some control over what that story is. Consistent, genuine philanthropic engagement adds depth to your public identity. Board positions build professional skills and connections. Speaking about causes you care about creates opportunities that purely career-driven networking doesn't." },
        { t: "Protecting yourself", b: "Once your name is associated with an organization, you own that association — good or bad. If the organization has a scandal, misuses funds, or doesn't deliver on its mission, your name is attached. Vet thoroughly before lending your name. Don't attach your name to organizations you haven't personally evaluated. And build a clause into any formal agreement: the right to withdraw your endorsement if the organization's conduct doesn't align with your values." },
        { t: "Your practice", b: "When you DO lend your name, go all in. Don't just show up at the event — visit the program, meet the team, understand the work. Then tell the story publicly: why this organization, why this cause, why now. That's the power move. Your endorsement is real. Everyone knows it. And the organization gets something money can't buy: your genuine, informed, public trust." },
      ]},

    creator: [
      { title: "Your community wants to help. Guide them.", icon: "", time: "5 min", cards: [
        { t: "The opportunity", b: "You have something most philanthropists don't — a direct line to thousands (or millions) of people who trust you. That's not just an audience. It's a giving community waiting to be activated. When you share a cause, people act. That power is real — and it comes with responsibility." },
        { t: "The responsibility", b: "When you promote a cause, your audience gives. That means you need to vet the organizations you recommend with the same rigor you'd use for your own money. Your followers are trusting your judgment. If you send them to an organization that misuses funds or doesn't deliver — that's your credibility on the line. Vet first, promote second." },
        { t: "Authenticity over urgency", b: "The most effective giving promotions aren't the urgent ones ('DONATE NOW!'). They're the authentic ones ('I care about this because...'). Share your GPS values. Tell your audience why this cause matters to YOU. Authenticity drives sustainable giving. Urgency drives one-time clicks that people forget about." },
        { t: "What to share", b: "Share the organization's mission. Share why YOU connected with it. Tag them so your audience can learn more. If you're comfortable, share what you gave — but the amount matters less than the story. 'I gave to this organization because they do the work my grandmother used to do in our neighborhood' is more powerful than '$5,000 donated today.'" },
        { t: "What not to share", b: "Don't promote organizations you haven't vetted. Don't share in a way that pressures your audience to give. Don't make it about your generosity — make it about the cause. And don't promote so frequently that every post feels like a fundraiser. Your audience followed you for your content. Giving should be woven in, not layered on top." },
        { t: "The multiplier math", b: "A $500 gift from you might fund one thing. But if you share that gift with 100,000 followers and 200 of them give $25 each — that's $5,000 in additional support. Your $500 became $5,500. That's the multiplier effect. Your platform isn't just reach — it's leverage for the causes you care about." },
        { t: "Your practice", b: "Pick one organization from your Discover tab. Learn about them. If they resonate, give — even a small amount. Then share one thing about them with your audience. Not a fundraiser. Not a campaign. Just: 'I support this organization because...' and let your community discover them. That's community-led philanthropy in action." },
      ]},
      { title: "Subscription income and giving", icon: "", time: "5 min", cards: [
        { t: "The natural fit", b: "Recurring revenue is the dream for creators — and it's also the perfect foundation for recurring giving. If you earn $10K/month from subscriptions, Patreon, memberships, or ad revenue, committing $200/month to an organization you believe in is natural, sustainable, and meaningful. It's 2% of your income. The organization can plan around it. You barely notice it." },
        { t: "Why recurring matters more than one-time", b: "A $2,400 annual gift given as $200/month is more valuable to an organization than a $2,400 one-time gift in December. Monthly giving lets them budget, hire, and plan programs with confidence. They know the money is coming. That predictability is worth more than the dollar amount suggests. You're not just a donor — you're reliable revenue." },
        { t: "The public practice", b: "Consider sharing your giving practice with your audience — not the amount, but the practice. 'Every month, a portion of what you support me with goes to organizations doing work I believe in.' Your audience sees their support creating change beyond entertainment. Some will be inspired to start their own practice. That's the multiplier you can't buy." },
        { t: "Brand deals and charity", b: "Some brand deals include a charitable component — 'a portion of proceeds goes to charity.' Before you sign, ask: which charity? How much is 'a portion'? Who chose the organization? Is it aligned with your GPS? If the brand picked the charity and you've never heard of them, that's their philanthropy, not yours. If the charity aligns with your values and you'd support them anyway — that's a partnership worth doing." },
        { t: "When income scales", b: "At $5K/month you're building habits. At $20K/month you have real giving capacity. At $50K+/month you should be talking to a CPA about a DAF (charitable savings account) — contribute in high months, distribute over time. The median DAF account holds around $25K — about half of all accounts are under that amount. That means if you fund one during a strong quarter, you have a meaningful giving reserve that works for you year-round. The beauty of creator income is that it often scales gradually. Your giving practice can scale with it, month by month, without dramatic decisions." },
        { t: "Scaling together", b: "As your audience grows, your giving grows. As your giving grows, you share that journey. The community sees their support creating change beyond entertainment. This is community-led philanthropy — your audience isn't just watching you give. They're part of the giving. Some creators build this into their brand identity. It's not a gimmick. It's a values statement." },
        { t: "Your practice", b: "Open your bank account or payment dashboard. Look at last month's revenue. Pick a percentage — even 1%. Calculate the dollar amount. Find one organization in Discover that aligns with your GPS. Set up a monthly gift at that amount. Log it in StewardHouse. You just built a recurring giving practice in 5 minutes. The organization now has a reliable funder. Your audience has a creator who shows up for more than content." },
      ]},
      { title: "GoFundMe isn't a giving strategy", icon: "", time: "5 min", cards: [
        { t: "The reactive trap", b: "Something happens. Someone shares a GoFundMe. You give $500. It feels good — you helped. But a month later you've given to 12 campaigns and have no idea if any of them were effective. You spent $3,000 on impulse. No relationship was built. No organization was strengthened. No pattern of giving emerged. That's reactive giving. It's human and generous — but it's not a strategy." },
        { t: "Why reactive feels so good", b: "Reactive giving triggers an immediate emotional response — someone is in crisis, you can help, the relief is instant. That's why GoFundMe campaigns spread so fast. But the emotional high fades quickly, and it's replaced by: did that money actually help? Was the campaign legitimate? Could I have done more good somewhere else? Reactive giving answers urgency. Intentional giving answers values. You need both — but in the right proportion." },
        { t: "The intentional shift", b: "Intentional giving responds to your GPS, not to your feed. Your GPS tells you what you care about — causes, geography, values. Give there first. Build relationships with organizations that do sustained work in those areas. Then, when a GoFundMe appears that aligns with your values, you can give to that too — knowing your core giving is already handled." },
        { t: "The 80/20 rule", b: "A healthy giving practice is roughly 80% intentional and 20% reactive. The 80% goes to organizations you've vetted, aligned with your GPS, and committed to supporting. The 20% is your 'response fund' — money set aside for the unexpected. A natural disaster. A friend's medical emergency. A campaign that genuinely moves you. The response fund prevents reactive giving from consuming your entire budget." },
        { t: "When crowdfunding IS the right call", b: "Not all crowdfunding is reactive. Sometimes a GoFundMe is the only way to help — an individual in crisis, a community emergency, a cause with no organizational infrastructure. If the campaign aligns with your values and you've done basic vetting (who's running it? where does the money go? is it real?), give. Just don't let it replace your relationship with organizations doing sustained work." },
        { t: "The creator's dilemma", b: "Your audience expects you to respond to everything. A tragedy happens, and your DMs fill with 'why haven't you posted about this?' That pressure can turn your giving into performance. You don't owe your audience a response to every crisis. You owe your values a consistent practice. When you DO respond publicly, share WHY — 'This aligns with what I care about, and here's how I'm supporting it.' That's authentic. Silence on some things doesn't mean you don't care. It means you're intentional." },
        { t: "Your practice", b: "Set a monthly reactive giving budget — maybe 10-20% of your total giving intention. When a campaign or crisis moves you, give from that budget. When it's gone, it's gone until next month. The rest goes to your GPS-aligned organizations. Log everything in StewardHouse. At the end of the year, you'll see the balance: how much was intentional, how much was reactive. That awareness alone changes how you give." },
      ]},
    ],
    other: [
      { title: "Finding your giving identity", icon: "", time: "4 min", cards: [
        { t: "You don't need a label", b: "You don't have to be a 'philanthropist' to give intentionally. You just have to care about something and act on it. Your GPS captures what you care about — causes, geography, values. That's your giving identity. It doesn't come from your industry, your income, or your public profile. It comes from your story." },
        { t: "Where identity comes from", b: "Your giving identity is shaped by the same things that shaped you: where you grew up, who influenced you, what you've seen, and what you believe should be different. The GPS captured all of that in your own words. Read it back. That's not a philanthropic strategy — it's a mirror. The causes you chose, the geography you selected, the legacy you described — that's who you are as a giver." },
        { t: "Start where you are", b: "If you've never given intentionally before, the best first step is the smallest one. Find one organization in the Discover tab that resonates. Give them $50 unrestricted. That's it. You've started. The second gift is easier than the first. The third is easier than the second. The practice builds on itself. Nobody starts with a foundation. Everyone starts with a first gift." },
        { t: "Giving isn't just money", b: "Your time, your skills, your voice, your network — all of these have value. Volunteering at a food bank. Mentoring a student. Sharing an organization's work with your contacts. If money is tight, give what you can — including things that aren't money. StewardHouse tracks financial gifts, but the platform values all forms of generosity." },
        { t: "Your compass, your pace", b: "StewardHouse doesn't tell you when to give, how much to give, or who to give to. It gives you the tools to figure that out for yourself — at your pace. Your GPS is here whenever you need it. The Learn tab is here when you're curious. The Discover tab is here when you're ready. No rush. No guilt. Just intention, whenever you're ready." },
      ]},
    ],
  };

  const LESSONS = [...universalLessons, visLesson, ...(segmentLessons[seg] || segmentLessons.other)];

  // GPS-based vehicle signpost
  const budgetSignal = a?.budget || "";
  const vehicleSuggestion = budgetSignal.includes("250") || budgetSignal.includes("50K")
    ? "Based on your giving intention, a DAF or community foundation could offer meaningful tax benefits. Worth exploring."
    : budgetSignal.includes("10K") || budgetSignal.includes("1K")
    ? "At your giving level, a donor-advised fund might be worth understanding — even if you don't open one yet."
    : "Personal giving is the simplest place to start. As your giving grows, other vehicles may make sense.";

  // Advisor brief
  const buildBrief = () => {
    if (!a) return "";
    const cl = (a.causes || []).map(id => CAUSES.find(c => c.id === id)?.label).filter(Boolean).join(", ");
    return `PHILANTHROPIC PROFILE SUMMARY — FOR FINANCIAL ADVISOR / CPA\n\nPrepared by StewardHouse\n\nClient's Giving Profile:\n- Cause areas: ${cl}\n- Geography: ${a.geoDetail || "Not specified"}\n- Annual giving intention: ${a.budget || "Not specified"}\n- Giving depth: ${a.depth || "Not specified"}\n- Segment: ${a.segment ? a.segment.charAt(0).toUpperCase() + a.segment.slice(1) : "Not specified"}\n- Career stage: ${a.stage ? a.stage.charAt(0).toUpperCase() + a.stage.slice(1) : "Not specified"}\n- Giving visibility: ${a.visibility === "public" ? "Public — uses platform to amplify causes" : a.visibility === "private" ? "Private — prefers anonymous giving where possible" : "Selective — shares when appropriate"}\n- Current giving vehicle: Personal\n\nDiscussion topics for your next meeting:\n1. Is a donor-advised fund appropriate given this client's income pattern?\n2. Are there tax-efficient assets (appreciated stock, etc.) that could be contributed?\n3. What is the optimal timing for charitable contributions given this year's income?\n4. Does the client's giving intention warrant a more structured vehicle?${a.visibility === "private" ? "\n5. Can gifts be structured for maximum privacy (anonymous DAF grants)?" : ""}\n\nVehicle cost reference:\n- DAF (Fidelity/Schwab): ~0.60% of assets/year. No minimum to open. On $25K fund = ~$150/year.\n- Community Foundation: $5K-$25K minimum to open. 1-2% of assets/year.\n- Private Foundation: $5K-$25K setup + $50K-$200K+/year operations + IRS-mandated 5% annual distribution of total assets as grants.\n- Philanthropic Advisor: $150-$500/hour or $2K-$10K/year retainer.\n\nThis summary was generated from the client's Giving Policy Statement on StewardHouse. The client has consented to sharing this information with their financial professional.\n\n— StewardHouse | stewardhouse.com`;
  };

  // Glossary view
  if (showGlossary) {
    return <Fade k="glossary"><div style={{ paddingTop: 8, paddingBottom: 40 }}>
      <div onClick={() => setShowGlossary(false)} style={{ fontSize: 13, color: C.light, fontFamily: f, cursor: "pointer", marginBottom: 12 }}>← Back to Learn</div>
      <div style={{ fontSize: 11, color: C.teal, fontFamily: f, textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 600, marginBottom: 4 }}>Glossary</div>
      <h2 style={{ fontSize: 22, color: C.navy, fontFamily: s, fontWeight: 400, marginBottom: 6 }}>Terms to know</h2>
      <p style={{ fontSize: 13, color: C.light, fontFamily: f, lineHeight: 1.5, marginBottom: 16 }}>Tap any term to learn what it means. No jargon, no assumptions.</p>
      {GLOSSARY.map((g, i) => (
        <div key={i} style={{ background: C.card, borderRadius: 12, padding: "14px 16px", border: `1px solid ${C.border}`, marginBottom: 6 }}>
          <div style={{ fontSize: 14, fontWeight: 600, color: C.navy, fontFamily: f, marginBottom: 4 }}>{g.term}</div>
          <div style={{ fontSize: 13, color: C.text, fontFamily: f, lineHeight: 1.6 }}>{g.def}</div>
        </div>
      ))}
    </div></Fade>;
  }

  // Vehicles Guide view
  if (showVehicles) {
    if (showBrief) {
      return <Fade k="brief"><div style={{ paddingTop: 8 }}>
        <div onClick={() => setShowBrief(false)} style={{ fontSize: 13, color: C.light, fontFamily: f, cursor: "pointer", marginBottom: 12 }}>← Back to vehicles</div>
        <div style={{ fontSize: 11, color: C.teal, fontFamily: f, textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 600, marginBottom: 6 }}>Advisor Brief</div>
        <h2 style={{ fontSize: 20, color: C.navy, fontFamily: s, fontWeight: 400, marginBottom: 12 }}>Share this with your financial advisor</h2>
        <p style={{ fontSize: 13, color: C.light, fontFamily: f, lineHeight: 1.5, marginBottom: 14 }}>This one-page summary gives your advisor or CPA the context they need to help you think through giving vehicles. Copy it and send it before your next meeting.</p>
        <div style={{ background: C.card, borderRadius: 14, padding: "18px 16px", border: `1px solid ${C.border}`, marginBottom: 14 }}>
          <div style={{ fontSize: 12, fontFamily: "monospace", lineHeight: 1.7, color: C.text, whiteSpace: "pre-wrap" }}>{buildBrief()}</div>
        </div>
        <Btn onClick={() => { navigator.clipboard?.writeText(buildBrief()).then(() => { setBriefCopied(true); setTimeout(() => setBriefCopied(false), 2000); }); }}>{briefCopied ? "Copied ✓" : "Copy to clipboard"}</Btn>
      </div></Fade>;
    }

    return <Fade k="vehicles"><div style={{ paddingTop: 8, paddingBottom: 40 }}>
      <div onClick={() => setShowVehicles(false)} style={{ fontSize: 13, color: C.light, fontFamily: f, cursor: "pointer", marginBottom: 12 }}>← Back to Learn</div>
      <div style={{ fontSize: 11, color: C.teal, fontFamily: f, textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 600, marginBottom: 4 }}>Giving Vehicles</div>
      <h2 style={{ fontSize: 22, color: C.navy, fontFamily: s, fontWeight: 400, marginBottom: 6 }}>How you give matters too</h2>
      <p style={{ fontSize: 13, color: C.light, fontFamily: f, lineHeight: 1.5, marginBottom: 16 }}>These aren't recommendations — they're options. The right vehicle depends on your income, your timeline, and your goals. Your financial advisor or CPA can help you decide.</p>

      {/* GPS signpost */}
      <div style={{ background: C.goldLt, borderRadius: 12, padding: "14px 16px", marginBottom: 16, border: `1px solid ${C.gold}20` }}>
        <div style={{ fontSize: 13, fontFamily: f, color: C.text, lineHeight: 1.6, fontStyle: "italic" }}>{vehicleSuggestion}</div>
      </div>

      {VEHICLES.map(v => {
        const isExp = expandedV === v.id;
        return <div key={v.id} style={{ background: C.card, borderRadius: 14, border: `1px solid ${C.border}`, marginBottom: 10, overflow: "hidden" }}>
          <div onClick={() => setExpandedV(isExp ? null : v.id)} style={{ padding: "16px 18px", cursor: "pointer", display: "flex", alignItems: "center", gap: 14 }}>
            <div style={{ fontSize: 24, flexShrink: 0 }}>{v.icon}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 15, fontWeight: 600, color: C.navy, fontFamily: f }}>{v.name}</div>
              <div style={{ fontSize: 12, color: C.light, fontFamily: f }}>{v.who}</div>
            </div>
            <div style={{ fontSize: 14, color: C.muted }}>{isExp ? "−" : "+"}</div>
          </div>
          {isExp && <div style={{ padding: "0 18px 16px", borderTop: `1px solid ${C.border}`, paddingTop: 14 }}>
            <div style={{ fontSize: 14, fontFamily: f, color: C.text, lineHeight: 1.7, marginBottom: 12 }}>{v.desc}</div>
            <div style={{ marginBottom: 8 }}><span style={{ fontSize: 12, fontWeight: 600, color: C.sage, fontFamily: f }}>Works well because: </span><span style={{ fontSize: 12, color: C.text, fontFamily: f }}>{v.pros}</span></div>
            <div style={{ marginBottom: 8 }}><span style={{ fontSize: 12, fontWeight: 600, color: "#E8815C", fontFamily: f }}>Consider: </span><span style={{ fontSize: 12, color: C.text, fontFamily: f }}>{v.cons}</span></div>
            <div style={{ marginBottom: 12 }}><span style={{ fontSize: 12, fontWeight: 600, color: C.navy, fontFamily: f }}>What it costs: </span><span style={{ fontSize: 12, color: C.text, fontFamily: f }}>{v.cost}</span></div>
            <div style={{ background: C.cream, borderRadius: 10, padding: "12px 14px" }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: C.navy, fontFamily: f, marginBottom: 2 }}>Your next step</div>
              <div style={{ fontSize: 12, color: C.text, fontFamily: f, lineHeight: 1.5 }}>{v.next}</div>
            </div>
          </div>}
        </div>;
      })}

      {/* Bridge to professional */}
      <div style={{ marginTop: 16 }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: C.navy, fontFamily: f, marginBottom: 8 }}>Ready to talk to someone?</div>
        <div onClick={() => setShowBrief(true)} style={{ background: C.tealLt, borderRadius: 14, padding: "16px 18px", cursor: "pointer", border: `1px solid ${C.teal}20`, marginBottom: 8, display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ fontSize: 12, fontFamily: f, fontWeight: 500, color: C.teal }}>Overview</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 14, fontWeight: 600, color: C.teal, fontFamily: f }}>Get your advisor brief</div>
            <div style={{ fontSize: 12, color: C.light, fontFamily: f }}>A one-page summary to share with your CPA or financial advisor</div>
          </div>
        </div>
        <div style={{ fontSize: 12, color: C.muted, fontFamily: f, fontStyle: "italic", lineHeight: 1.5, marginTop: 8 }}>StewardHouse provides education, not financial advice. Your financial advisor or CPA is the right person to help you choose a giving vehicle.</div>
      </div>
    </div></Fade>;
  }

  // Lesson view
  if (al !== null) {
    const l = LESSONS[al]; const card = l.cards[ci]; const isLast = ci === l.cards.length - 1;
    return <div style={{ paddingTop: 8, paddingBottom: 40 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
        <span onClick={() => { setAl(null); setCi(0); }} style={{ fontSize: 13, color: C.light, fontFamily: f, cursor: "pointer" }}>← Back</span>
        <span style={{ fontSize: 12, color: C.muted, fontFamily: f }}>{ci + 1} of {l.cards.length}</span>
      </div>
      <div style={{ fontSize: 13, fontWeight: 600, color: C.navy, fontFamily: f, marginBottom: 12 }}>{l.title}</div>
      <Fade k={ci}><div style={{ background: C.card, borderRadius: 14, padding: "24px 20px", border: `1px solid ${C.border}`, minHeight: 180, marginTop: 4 }}>
        <div style={{ fontSize: 11, color: C.teal, fontFamily: f, textTransform: "uppercase", letterSpacing: "0.08em", fontWeight: 600, marginBottom: 10 }}>{card.t}</div>
        <div style={{ fontSize: 15, lineHeight: 1.8, fontFamily: f, color: C.text }}>{card.b}</div>
      </div></Fade>
      {/* Progress bar */}
      <div style={{ display: "flex", gap: 3, marginTop: 12, marginBottom: 10 }}>
        {l.cards.map((_, i) => <div key={i} style={{ flex: 1, height: 3, borderRadius: 2, background: i <= ci ? C.teal : C.border, transition: "all 0.3s" }} />)}
      </div>
      <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
        {ci > 0 && <div style={{ flex: 1 }}><Btn outline onClick={() => setCi(ci - 1)}>Back</Btn></div>}
        <div style={{ flex: 1 }}><Btn onClick={() => { if (isLast) { if (!ld.includes(al)) setLD([...ld, al]); setAl(null); setCi(0); } else setCi(ci + 1); }}>{isLast ? "Complete ✓" : "Continue"}</Btn></div>
      </div>
    </div>;
  }

  // Learn home
  return <Fade k="learn"><div style={{ paddingTop: 8, paddingBottom: 40 }}>
    <div style={{ fontSize: 11, color: C.teal, fontFamily: f, textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 600, marginBottom: 4 }}>Learn</div>
    <h1 style={{ fontSize: 24, color: C.navy, fontFamily: s, fontWeight: 400, marginBottom: 14 }}>At your pace</h1>

    {/* Giving Vehicles Guide — featured */}
    <div onClick={() => setShowVehicles(true)} style={{ background: C.goldLt, borderRadius: 14, padding: "18px", cursor: "pointer", border: `1px solid ${C.gold}22`, marginBottom: 16, display: "flex", alignItems: "center", gap: 14 }}>
      <div style={{ fontSize: 14, fontFamily: f, fontWeight: 500, width: 44, height: 44, borderRadius: 12, background: C.card, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, color: C.teal }}>GV</div>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 15, fontWeight: 600, color: C.navy, fontFamily: f }}>Giving Vehicles Guide</div>
        <div style={{ fontSize: 12, color: C.light, fontFamily: f }}>DAFs, foundations, and more — in plain language</div>
      </div>
      <div style={{ color: C.gold }}>→</div>
    </div>

    {/* Essentials section */}
    <div style={{ fontSize: 12, fontWeight: 600, color: C.teal, fontFamily: f, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8 }}>Essentials</div>
    {LESSONS.slice(0, 4).map((l, i) => { const d = ld.includes(i); return <div key={i} onClick={() => { setAl(i); setCi(0); }} style={{ background: C.card, borderRadius: 14, padding: "14px 16px", cursor: "pointer", border: `1px solid ${d ? C.teal + "44" : C.border}`, display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
      <div style={{ fontSize: 24, width: 40, height: 40, borderRadius: 10, background: d ? C.tealLt : C.cream, display: "flex", alignItems: "center", justifyContent: "center" }}>{d ? "✓" : (i + 1)}</div>
      <div style={{ flex: 1 }}><div style={{ fontSize: 14, fontWeight: 600, color: C.navy, fontFamily: f }}>{l.title}</div><div style={{ fontSize: 11, color: C.muted, fontFamily: f }}>{l.time || `${l.cards.length} cards`}</div></div>
      <div style={{ color: C.muted }}>›</div>
    </div> })}

    {/* Segment-specific section */}
    {LESSONS.length > 4 && <>
      <div style={{ fontSize: 12, fontWeight: 600, color: theme.accent, fontFamily: f, textTransform: "uppercase", letterSpacing: "0.08em", marginTop: 16, marginBottom: 8 }}>{theme.label}</div>
      {LESSONS.slice(4).map((l, i) => { const idx = i + 4; const d = ld.includes(idx); return <div key={idx} onClick={() => { setAl(idx); setCi(0); }} style={{ background: C.card, borderRadius: 14, padding: "14px 16px", cursor: "pointer", border: `1px solid ${d ? theme.accent + "44" : C.border}`, display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
        <div style={{ fontSize: 24, width: 40, height: 40, borderRadius: 10, background: d ? theme.accentLt : C.cream, display: "flex", alignItems: "center", justifyContent: "center" }}>{d ? "✓" : (i + 1)}</div>
        <div style={{ flex: 1 }}><div style={{ fontSize: 14, fontWeight: 600, color: C.navy, fontFamily: f }}>{l.title}</div><div style={{ fontSize: 11, color: C.muted, fontFamily: f }}>{l.time || `${l.cards.length} cards`}</div></div>
        <div style={{ color: C.muted }}>›</div>
      </div> })}
    </>}

    {/* Glossary + Support */}
    <div style={{ marginTop: 20 }}>
      <div onClick={() => setShowGlossary(true)} style={{ background: C.card, borderRadius: 14, padding: "14px 16px", cursor: "pointer", border: `1px solid ${C.border}`, display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
        <div style={{ width: 36, height: 36, borderRadius: 10, background: C.cream, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontFamily: f, fontWeight: 500, color: C.teal }}>A-Z</div>
        <div style={{ flex: 1 }}><div style={{ fontSize: 14, fontWeight: 600, color: C.navy, fontFamily: f }}>Glossary</div><div style={{ fontSize: 11, color: C.muted, fontFamily: f }}>Definitions for every term — no jargon</div></div>
        <div style={{ color: C.muted }}>›</div>
      </div>
      <div style={{ background: C.tealLt, borderRadius: 14, padding: "14px 16px", border: `1px solid ${C.teal}15`, display: "flex", alignItems: "center", gap: 12 }}>
        <div style={{ width: 36, height: 36, borderRadius: 10, background: C.card, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontFamily: f, fontWeight: 500, color: C.teal }}>AI</div>
        <div style={{ flex: 1 }}><div style={{ fontSize: 14, fontWeight: 600, color: C.teal, fontFamily: f }}>Ask StewardHouse</div><div style={{ fontSize: 11, color: C.light, fontFamily: f }}>AI-powered answers to your giving questions — coming soon</div></div>
      </div>
    </div>
  </div></Fade>;
}

  { id: "manager", label: "Manager", desc: "Assistant / Chief of Staff", sees: "Payments, acknowledgments, agreements, calendar, gift history", notSees: "GPS content, personal answers" },
  { id: "financial", label: "Financial Advisor", desc: "CPA / Financial Advisor", sees: "Payment history, vehicles, acknowledgments, annual summary", notSees: "GPS, relationship notes, org details" },
  { id: "advisor", label: "Philanthropic Advisor", desc: "Giving Strategy Advisor", sees: "GPS, giving strategy, org relationships, reports", notSees: "Payment details, bank info, tax docs" },
  { id: "agent", label: "Agent", desc: "Agent / Manager / Rep", sees: "GPS summary, giving status, pending solicitations", notSees: "Gift amounts, financial details, personal answers" },
];

// ─── TEAM WORKSPACE ───
function TeamWorkspace({ grants }) {
  const [activeTab, setActiveTab] = useState("overview");
  const [showAccess, setShowAccess] = useState(false);
  const [teamMembers, setTeamMembers] = useState([
    { name: "Jordan", role: "manager", active: true },
    { name: "Sarah", role: "financial", active: true },
  ]);

  const g = grants || SAMPLE_GRANTS;
  const today = new Date();
  const pendingReports = g.filter(x => x.report?.status === "pending");
  const pendingPayments = g.filter(x => x.commitment?.nextDate);
  const pendingAcks = g.filter(x => x.ack === "pending");
  const pendingAgreements = g.filter(x => x.agreement === "sent" || x.agreement === "draft");
  const pastDueReports = pendingReports.filter(x => new Date(x.report.due) < today).length;
  const pastDuePayments = pendingPayments.filter(x => new Date(x.commitment.nextDate) < today).length;
  const pastDueAcks = pendingAcks.length; // all pending acks are effectively past due

  const [reminded, setReminded] = useState({});
  const remind = (id, type) => {
    setReminded(prev => ({ ...prev, [`${type}-${id}`]: true }));
    setTimeout(() => setReminded(prev => ({ ...prev, [`${type}-${id}`]: false })), 2500);
  };

  const tabs = [
    { id: "overview", label: "Overview", icon: "" },
    { id: "reports", label: "Reports", icon: "", count: pendingReports.length, pastDue: pastDueReports },
    { id: "payments", label: "Payments", icon: "", count: pendingPayments.length, pastDue: pastDuePayments },
    { id: "acks", label: "Acknowledgments", icon: "", count: pendingAcks.length, pastDue: pastDueAcks },
    { id: "agreements", label: "Agreements", icon: "", count: pendingAgreements.length },
    { id: "calendar", label: "Calendar", icon: "" },
  ];

  if (showAccess) return (
    <Fade k="access"><div style={{ paddingTop: 8, paddingBottom: 40 }}>
      <div onClick={() => setShowAccess(false)} style={{ fontSize: 13, color: C.light, fontFamily: f, cursor: "pointer", marginBottom: 12 }}>← Back</div>
      <div style={{ fontSize: 11, color: C.teal, fontFamily: f, textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 600, marginBottom: 4 }}>Access Control</div>
      <h2 style={{ fontSize: 22, color: C.navy, fontFamily: s, fontWeight: 400, marginBottom: 6 }}>Your team</h2>
      <p style={{ fontSize: 13, color: C.light, fontFamily: f, lineHeight: 1.5, marginBottom: 16 }}>You control who sees what. Each person only accesses what their role requires.</p>

      {teamMembers.map((m, i) => {
        const role = ROLES.find(r => r.id === m.role);
        return <div key={i} style={{ background: C.card, borderRadius: 14, padding: "16px 18px", border: `1px solid ${C.border}`, marginBottom: 10 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <div style={{ fontSize: 15, fontWeight: 600, color: C.navy, fontFamily: f }}>{m.name}</div>
            <Tag text={role?.label || m.role} bg={C.tealLt} />
          </div>
          <div style={{ fontSize: 12, color: C.light, fontFamily: f, lineHeight: 1.5, marginBottom: 4 }}>Can see: {role?.sees}</div>
          <div style={{ fontSize: 12, color: C.muted, fontFamily: f, lineHeight: 1.5, marginBottom: 8 }}>Cannot see: {role?.notSees}</div>
          <div style={{ display: "flex", gap: 8 }}>
            <div style={{ flex: 1, padding: "8px 12px", borderRadius: 50, background: C.tealLt, textAlign: "center", cursor: "pointer", fontSize: 12, fontWeight: 600, fontFamily: f, color: C.teal }}>Send message</div>
          </div>
        </div>;
      })}

      <div style={{ marginTop: 16 }}>
        <Btn outline onClick={() => {}}>Invite a team member</Btn>
        <div style={{ fontSize: 12, color: C.muted, fontFamily: f, textAlign: "center", marginTop: 8 }}>Invite by email with role assignment — coming in the full release</div>
      </div>
    </div></Fade>
  );

  const renderTab = () => {
    switch (activeTab) {
      case "overview":
        return (<>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 }}>
            {[
              { n: pendingReports.length, l: "Pending reports", c: pendingReports.length > 0 ? C.gold : C.sage, pd: pastDueReports },
              { n: pendingPayments.length, l: "Upcoming payments", c: pendingPayments.length > 0 ? C.gold : C.sage, pd: pastDuePayments },
              { n: pendingAcks.length, l: "Missing acknowledgments", c: pendingAcks.length > 0 ? "#E8815C" : C.sage, pd: pastDueAcks },
              { n: pendingAgreements.length, l: "Open agreements", c: pendingAgreements.length > 0 ? C.gold : C.sage, pd: 0 },
            ].map((item, i) => (
              <div key={i} style={{ background: C.card, borderRadius: 12, padding: "16px 14px", border: `1px solid ${C.border}` }}>
                <div style={{ fontSize: 22, fontWeight: 700, color: item.c, fontFamily: f }}>{item.n}</div>
                <div style={{ fontSize: 11, color: C.light, fontFamily: f, marginTop: 2 }}>{item.l}</div>
                {item.pd > 0 && <div style={{ fontSize: 10, fontWeight: 600, color: "#E8815C", fontFamily: f, marginTop: 4 }}>{item.pd} past due</div>}
              </div>
            ))}
          </div>
          <div style={{ fontSize: 13, fontWeight: 600, color: C.navy, fontFamily: f, marginBottom: 8 }}>Active grants</div>
          {g.map(gr => (
            <div key={gr.id} style={{ background: C.card, borderRadius: 12, padding: "12px 14px", border: `1px solid ${C.border}`, marginBottom: 6, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontSize: 14, fontWeight: 600, color: C.navy, fontFamily: f }}>{gr.org}</div>
                <div style={{ fontSize: 11, color: C.muted, fontFamily: f }}>{gr.type} · {gr.vehicle === "daf" ? "DAF" : gr.vehicle === "community" ? "Community Foundation" : "Personal"}{gr.commitment ? ` · Year ${gr.commitment.paid + 1} of ${gr.commitment.total}` : ""}</div>
              </div>
              <div style={{ fontSize: 15, fontWeight: 700, color: C.teal, fontFamily: f }}>${gr.amount.toLocaleString()}</div>
            </div>
          ))}
        </>);

      case "reports":
        return pendingReports.length > 0 ? pendingReports.map(gr => {
          const isPastDue = new Date(gr.report.due) < today;
          const wasReminded = reminded[`report-${gr.id}`];
          return (
          <div key={gr.id} style={{ background: C.card, borderRadius: 12, padding: "14px 16px", border: `1px solid ${isPastDue ? "#E8815C44" : C.border}`, marginBottom: 8 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <div style={{ fontSize: 14, fontWeight: 600, color: C.navy, fontFamily: f }}>{gr.org}</div>
                <div style={{ fontSize: 12, color: isPastDue ? "#E8815C" : C.light, fontFamily: f, fontWeight: isPastDue ? 600 : 400, marginTop: 4 }}>{isPastDue ? "Past due" : "Due"}: {gr.report.due}</div>
              </div>
              <div style={{ fontSize: 14, fontWeight: 600, color: C.teal, fontFamily: f }}>${gr.amount.toLocaleString()}</div>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 8 }}>
              <div style={{ display: "flex", gap: 6 }}>
                {isPastDue && <Tag text="Past due" bg="#FDE8E0" />}
                <Tag text="Pending" bg={C.goldLt} />
              </div>
              <div onClick={() => remind(gr.id, "report")} style={{ padding: "5px 12px", borderRadius: 50, background: wasReminded ? C.tealLt : C.cream, cursor: "pointer", fontSize: 11, fontWeight: 600, fontFamily: f, color: wasReminded ? C.teal : C.navy, transition: "all 0.2s" }}>
                {wasReminded ? "Sent ✓" : "Remind"}
              </div>
            </div>
          </div>
        )}) : <div style={{ textAlign: "center", paddingTop: 30, color: C.muted, fontFamily: f, fontSize: 14 }}>No pending reports</div>;

      case "payments":
        return pendingPayments.length > 0 ? pendingPayments.map(gr => {
          const isPastDue = new Date(gr.commitment.nextDate) < today;
          const wasReminded = reminded[`payment-${gr.id}`];
          return (
          <div key={gr.id} style={{ background: C.card, borderRadius: 12, padding: "14px 16px", border: `1px solid ${isPastDue ? "#E8815C44" : C.border}`, marginBottom: 8 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <div style={{ fontSize: 14, fontWeight: 600, color: C.navy, fontFamily: f }}>{gr.org}</div>
                <div style={{ fontSize: 12, color: isPastDue ? "#E8815C" : C.light, fontFamily: f, fontWeight: isPastDue ? 600 : 400, marginTop: 4 }}>{isPastDue ? "Past due" : "Due"}: {gr.commitment.nextDate} · ${gr.amount.toLocaleString()}</div>
              </div>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 8 }}>
              <div style={{ display: "flex", gap: 6 }}>
                <Tag text={`Year ${gr.commitment.paid + 1} of ${gr.commitment.total}`} bg={C.tealLt} />
                <Tag text={gr.vehicle === "daf" ? "Via DAF" : "Personal"} />
                {isPastDue && <Tag text="Past due" bg="#FDE8E0" />}
              </div>
              <div onClick={() => remind(gr.id, "payment")} style={{ padding: "5px 12px", borderRadius: 50, background: wasReminded ? C.tealLt : C.cream, cursor: "pointer", fontSize: 11, fontWeight: 600, fontFamily: f, color: wasReminded ? C.teal : C.navy, transition: "all 0.2s" }}>
                {wasReminded ? "Sent ✓" : "Remind"}
              </div>
            </div>
          </div>
        )}) : <div style={{ textAlign: "center", paddingTop: 30, color: C.muted, fontFamily: f, fontSize: 14 }}>No upcoming payments</div>;

      case "acks":
        return pendingAcks.length > 0 ? pendingAcks.map(gr => {
          const wasReminded = reminded[`ack-${gr.id}`];
          return (
          <div key={gr.id} style={{ background: C.card, borderRadius: 12, padding: "14px 16px", border: `1px solid #E8815C44`, marginBottom: 8 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <div style={{ fontSize: 14, fontWeight: 600, color: C.navy, fontFamily: f }}>{gr.org}</div>
                <div style={{ fontSize: 12, color: "#E8815C", fontFamily: f, fontWeight: 600, marginTop: 4 }}>Payment acknowledgment needed for ${gr.amount.toLocaleString()} gift</div>
              </div>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 8 }}>
              <Tag text="Missing" bg="#FDE8E0" />
              <div onClick={() => remind(gr.id, "ack")} style={{ padding: "5px 12px", borderRadius: 50, background: wasReminded ? C.tealLt : C.cream, cursor: "pointer", fontSize: 11, fontWeight: 600, fontFamily: f, color: wasReminded ? C.teal : C.navy, transition: "all 0.2s" }}>
                {wasReminded ? "Sent ✓" : "Remind"}
              </div>
            </div>
          </div>
        )}) : <div style={{ textAlign: "center", paddingTop: 30, color: C.muted, fontFamily: f, fontSize: 14 }}>All payment acknowledgments received</div>;

      case "agreements":
        return pendingAgreements.length > 0 ? pendingAgreements.map(gr => (
          <div key={gr.id} style={{ background: C.card, borderRadius: 12, padding: "14px 16px", border: `1px solid ${C.border}`, marginBottom: 8 }}>
            <div style={{ fontSize: 14, fontWeight: 600, color: C.navy, fontFamily: f }}>{gr.org}</div>
            <div style={{ fontSize: 12, color: C.light, fontFamily: f, marginTop: 4 }}>Status: {gr.agreement}</div>
            <Tag text={gr.agreement === "sent" ? "Awaiting signature" : "Draft"} bg={C.goldLt} />
          </div>
        )) : <div style={{ textAlign: "center", paddingTop: 30, color: C.muted, fontFamily: f, fontSize: 14 }}>No open agreements</div>;

      case "calendar":
        return SAMPLE_EVENTS.map(ev => (
          <div key={ev.id} style={{ display: "flex", gap: 14, marginBottom: 12, alignItems: "flex-start" }}>
            <div style={{ width: 48, textAlign: "center", flexShrink: 0 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: C.navy, fontFamily: f }}>{ev.date.split(" ")[0]}</div>
              <div style={{ fontSize: 11, color: C.muted, fontFamily: f }}>{ev.date.split(" ")[1]}</div>
            </div>
            <div style={{ flex: 1, background: C.card, borderRadius: 10, padding: "10px 14px", border: `1px solid ${C.border}` }}>
              <div style={{ fontSize: 13, fontFamily: f, color: C.text }}>{ev.title}</div>
              <Tag text={ev.type} bg={ev.type === "payment" ? C.tealLt : ev.type === "visit" ? C.goldLt : C.cream} />
            </div>
          </div>
        ));

      default: return null;
    }
  };

  return (
    <Fade k="team">
      <div style={{ paddingTop: 8, paddingBottom: 40 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
          <div>
            <div style={{ fontSize: 11, color: C.teal, fontFamily: f, textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 600, marginBottom: 2 }}>Team Workspace</div>
            <div style={{ fontSize: 13, color: C.light, fontFamily: f }}>Grants management & operations</div>
          </div>
          <div onClick={() => setShowAccess(true)} style={{ padding: "6px 12px", borderRadius: 50, border: `1px solid ${C.border}`, cursor: "pointer", fontSize: 12, fontFamily: f, color: C.teal, fontWeight: 600 }}>Access Control</div>
        </div>

        {/* Tab bar */}
        <div style={{ display: "flex", gap: 4, overflowX: "auto", marginBottom: 16, paddingBottom: 4 }}>
          {tabs.map(t => (
            <div key={t.id} onClick={() => setActiveTab(t.id)} style={{
              padding: "8px 12px", borderRadius: 50, cursor: "pointer", whiteSpace: "nowrap",
              background: activeTab === t.id ? C.teal : C.card,
              color: activeTab === t.id ? "#fff" : C.text,
              fontSize: 12, fontWeight: 600, fontFamily: f,
              border: `1px solid ${activeTab === t.id ? C.teal : C.border}`,
              display: "flex", alignItems: "center", gap: 4, transition: "all 0.15s",
            }}>
              {t.label}
              {t.count > 0 && <span style={{ background: activeTab === t.id ? "rgba(255,255,255,0.3)" : t.pastDue > 0 ? "#FDE8E0" : C.goldLt, color: t.pastDue > 0 ? "#E8815C" : undefined, borderRadius: 50, padding: "1px 6px", fontSize: 10, fontWeight: 700 }}>{t.count}</span>}

}

// ─── PERSONALIZED CELEBRATION ───
// ─── FEEDBACK FORM ───
function FeedbackForm({ answers: a, gifts, lessonsDone, onBack }) {
  const [responses, setResponses] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const set = (k, v) => setResponses(prev => ({ ...prev, [k]: v }));

  const questions = [
    { id: "name", q: "Your name", type: "text", placeholder: "First and last name" },
    { id: "contact", q: "Best way to reach you", type: "text", placeholder: "Email or phone number" },
    { id: "world", q: "What world are you in?", type: "choice", options: ["Sports", "Music", "Entertainment", "Creator", "Other"] },
    { id: "gps_feel", q: "After completing the Giving Studio, how did your GPS feel?", type: "choice", options: ["It captured who I am", "Close but something was missing", "It didn't feel like me", "I haven't completed it yet"] },
    { id: "most_valuable", q: "What was the most valuable part of the experience?", type: "text", placeholder: "What stood out to you?" },
    { id: "confused", q: "What confused you or felt unnecessary?", type: "text", placeholder: "Be honest — this helps us" },
    { id: "come_back", q: "Would you come back and use this again?", type: "choice", options: ["Yes", "Maybe", "No"] },
    { id: "share", q: "Would you share this with a friend or colleague?", type: "choice", options: ["Yes", "Maybe", "No"] },
    { id: "missing", q: "What's missing that would make this useful for your real giving?", type: "text", placeholder: "Features, information, anything" },
    { id: "pay", q: "What would you value a platform like StewardHouse at per month?", type: "choice", options: ["$0 — I wouldn't pay for this", "$0 — I'd use it if it were free", "$1–$10/mo", "$10–$25/mo", "$25–$50/mo", "$50+/mo"] },
    { id: "pay_why", q: "What would make it worth that amount to you?", type: "text", placeholder: "What feature, experience, or outcome drives the value?" },
    { id: "anything", q: "Anything else you want us to know?", type: "text", placeholder: "Open floor — say whatever you want" },
  ];

  // Behavioral data captured automatically
  const behavioral = {
    segment: a?.segment || "not set",
    stage: a?.stage || "not set",
    visibility: a?.visibility || "not set",
    trust: a?.trust || "not set",
    authority: a?.authority || "not set",
    causesSelected: (a?.causes || []).length,
    giftsLogged: gifts?.length || 0,
    lessonsCompleted: lessonsDone?.length || 0,
    gpsCompleted: a?.legacy ? "yes" : "no",
  };

  const buildExport = () => {
    let txt = "STEWARDHOUSE FEEDBACK\n" + new Date().toLocaleDateString() + "\n";
    txt += "Name: " + (responses.name || "Anonymous") + "\n";
    txt += "Contact: " + (responses.contact || "Not provided") + "\n";
    txt += "World: " + (responses.world || behavioral.segment) + "\n\n";
    txt += "--- RESPONSES ---\n";
    questions.filter(q => q.id !== "name" && q.id !== "contact" && q.id !== "world").forEach(q => {
      txt += q.q + "\n" + (responses[q.id] || "(no response)") + "\n\n";
    });
    txt += "--- BEHAVIORAL DATA ---\n";
    Object.entries(behavioral).forEach(([k, v]) => { txt += k + ": " + v + "\n"; });
    return txt;
  };

  if (submitted) {
    return (
      <Fade k="fb-done"><div style={{ paddingTop: 8, paddingBottom: 40, textAlign: "center" }}>
        <div style={{ fontFamily: s, fontSize: 24, color: C.teal, marginTop: 40, marginBottom: 14 }}>Thank you</div>
        <h2 style={{ fontSize: 20, color: C.navy, fontFamily: s, fontWeight: 400, marginBottom: 10 }}>Thank you</h2>
        <p style={{ fontSize: 14, color: C.light, fontFamily: f, lineHeight: 1.6, maxWidth: 300, margin: "0 auto 20px" }}>Your feedback shapes what StewardHouse becomes. Every response matters.</p>
        <Btn onClick={onBack}>Back to Home</Btn>
      </div></Fade>
    );
  }

  return (
    <Fade k="feedback">
      <div style={{ paddingTop: 8, paddingBottom: 40 }}>
        <div onClick={onBack} style={{ fontSize: 13, color: C.light, fontFamily: f, cursor: "pointer", marginBottom: 12 }}>← Back</div>
        <div style={{ fontSize: 11, color: C.teal, fontFamily: f, textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 600, marginBottom: 4 }}>Feedback</div>
        <h1 style={{ fontSize: 24, color: C.navy, fontFamily: s, fontWeight: 400, marginBottom: 6 }}>Help us build this right</h1>
        <p style={{ fontSize: 13, color: C.light, fontFamily: f, lineHeight: 1.5, marginBottom: 20 }}>Honest answers only. There are no wrong responses. Your name and contact info let us follow up — but everything here is confidential and only seen by the StewardHouse team.</p>

        {questions.map((q, i) => (
          <div key={q.id} style={{ marginBottom: 18 }}>
            <div style={{ fontSize: 14, fontWeight: 600, color: C.navy, fontFamily: f, marginBottom: 8 }}>{i + 1}. {q.q}</div>
            {q.type === "choice" ? (
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {q.options.map(opt => (
                  <div key={opt} onClick={() => set(q.id, opt)} style={{
                    padding: "10px 16px", borderRadius: 50, cursor: "pointer",
                    border: `2px solid ${responses[q.id] === opt ? C.teal : C.border}`,
                    background: responses[q.id] === opt ? C.tealLt : C.card,
                    fontSize: 13, fontFamily: f, fontWeight: 500,
                    color: responses[q.id] === opt ? C.teal : C.text,
                    transition: "all 0.15s",
                  }}>{opt}</div>
                ))}
              </div>
            ) : (
              <textarea
                value={responses[q.id] || ""}
                onChange={e => set(q.id, e.target.value)}
                placeholder={q.placeholder || "Your thoughts..."}
                style={{ width: "100%", minHeight: q.id === "name" || q.id === "contact" ? 42 : 70, padding: 12, borderRadius: 12, border: `2px solid ${C.border}`, fontSize: 14, fontFamily: f, lineHeight: 1.5, color: C.text, resize: "vertical", outline: "none", boxSizing: "border-box", background: C.card }}
              />
            )}
          </div>
        ))}

        <Btn onClick={() => {
          // Validate input lengths to prevent abuse
          const MAX_FIELD_LEN = 5000;
          for (const [k, v] of Object.entries(responses)) {
            if (typeof v === "string" && v.length > MAX_FIELD_LEN) {
              alert("One of your responses is too long. Please shorten it and try again.");
              return;
            }
          }
          const txt = buildExport();
          // Send via FormSubmit
          fetch("https://formsubmit.co/ajax/talabifaouzi@gmail.com", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Accept": "application/json" },
            body: JSON.stringify({
              _subject: "StewardHouse Feedback — " + (responses.name || "Anonymous"),
              name: (responses.name || "Anonymous").slice(0, 200),
              contact: (responses.contact || "Not provided").slice(0, 200),
              world: (responses.world || behavioral.segment || "").slice(0, 200),
              feedback: txt.slice(0, 50000),
            })
          }).then(r => {
            if (!r.ok) console.warn("Feedback submission returned status " + r.status);
          }).catch(err => {
            console.warn("Feedback submission failed:", err.message);
          });
          // Clipboard backup
          navigator.clipboard?.writeText(txt).catch(() => {});
          setSubmitted(true);
        }}>Submit feedback</Btn>

        <div style={{ fontSize: 11, color: C.muted, fontFamily: f, fontStyle: "italic", textAlign: "center", marginTop: 10 }}>
          Your response is sent directly to the StewardHouse founder. It is not shared with anyone else.
        </div>
      </div>
    </Fade>
  );
}

// ─── GPS REVEAL — PHASED BUILD-UP ───
function GPSReveal({ answers, givingStyle, celebMsg, onContinue }) {
  const [phase, setPhase] = useState(0);
  // Phase 0: blank pause. 1: badge. 2: causes. 3: geography. 4: celebration. 5: button.
  useEffect(() => {
    const timings = [800, 1400, 1200, 1200, 1000];
    if (phase < 5) {
      const timer = setTimeout(() => setPhase(p => p + 1), timings[phase]);
      return () => clearTimeout(timer);
    }
  }, [phase]);

  const a = answers || {};
  const causeLabels = (a.causes || []).map(id => {
    const found = CAUSES.find(c => c.id === id);
    return found ? found.label : id;
  });
  const geoText = a.geoDetail || (a.geo || []).join(", ");
  const fade = (show) => ({ opacity: show ? 1 : 0, transform: show ? "translateY(0)" : "translateY(12px)", transition: "all 0.8s ease" });

  return (
    <div style={{ textAlign: "center", padding: "0 28px", maxWidth: 400 }}>
      {/* Quiet intro */}
      <div style={{ ...fade(phase >= 0), marginBottom: 32 }}>
        <div style={{ width: 40, height: 1, background: C.teal, margin: "0 auto 20px", opacity: 0.5 }} />
        <div style={{ fontSize: 12, color: C.muted, fontFamily: f, letterSpacing: "0.15em", textTransform: "uppercase" }}>Your Giving Policy Statement</div>
      </div>

      {/* Phase 1: Badge */}
      <div style={{ ...fade(phase >= 1), marginBottom: 24 }}>
        <div style={{ display: "inline-block", padding: "8px 20px", borderRadius: 50, background: C.tealLt, border: `1.5px solid ${C.teal}` }}>
          <span style={{ fontSize: 15, fontWeight: 600, color: C.teal, fontFamily: f }}>{givingStyle}</span>
        </div>
      </div>

      {/* Phase 2: Causes */}
      <div style={{ ...fade(phase >= 2), marginBottom: 20 }}>
        <div style={{ display: "flex", flexWrap: "wrap", justifyContent: "center", gap: 8 }}>
          {causeLabels.map((c, i) => (
            <span key={i} style={{ fontSize: 13, color: C.navy, fontFamily: f, padding: "6px 14px", background: C.card, borderRadius: 50, border: `1px solid ${C.border}` }}>{c}</span>
          ))}
        </div>
      </div>

      {/* Phase 3: Geography */}
      <div style={{ ...fade(phase >= 3), marginBottom: 28 }}>
        {geoText && <div style={{ fontSize: 14, color: C.light, fontFamily: s, fontStyle: "italic" }}>{geoText}</div>}
      </div>

      {/* Phase 4: Celebration line */}
      <div style={{ ...fade(phase >= 4), marginBottom: 28 }}>
        <p style={{ fontSize: 16, color: C.navy, fontFamily: s, fontWeight: 400, lineHeight: 1.6, maxWidth: 320, margin: "0 auto" }}>{celebMsg}</p>
      </div>

      {/* Phase 5: Button */}
      <div style={{ ...fade(phase >= 5) }}>
        <Btn onClick={onContinue}>See what we built for you</Btn>
      </div>
    </div>
  );
}

function getCelebration(a) {
  const priv = a.visibility === "private";
  const pub = a.visibility === "public";
  const deep = a.depth === "deep";
  const firstStep = a.existingOrgs?.includes("first step") || a.existingOrgs?.includes("haven't given");
  const hometown = a.geo?.includes("hometown");
  if (firstStep && hometown) return "You're starting something new — rooted in the place that made you. That's powerful.";
  if (firstStep) return "You just took the first step most people never take. Everything builds from here.";
  if (priv && deep) return "You give quietly and deeply. Lasting relationships with organizations you believe in. That's rare.";
  if (pub) return "You want your giving to inspire others. When you give publicly, you give others permission to do the same.";
  if (priv) return "You give quietly, on your own terms. Not for recognition — because it matters to you.";
  if (deep && hometown) return "You give close to home and go deep. The organizations you support know your name and you know their work.";
  return "You defined what your giving means — in your own words, on your own terms. Most people never do this.";
}

// ─── MAIN APP ───
function App() {
  const [screen, setScreen] = useState("landing");
  const [tab, setTab] = useState("home");
  const [answers, setAnswers] = useState(null);
  const [givingStyle, setGivingStyle] = useState(null);
  const [gifts, setGifts] = useState([]);
  const [lessonsDone, setLD] = useState([]);
  const [showGive, setShowGive] = useState(false);
  const [showSummary, setShowSummary] = useState(false);
  const [showFeedback, setShowFeedback] = useState(false);
  const [celebMsg, setCelMsg] = useState("");

  // ─── LOCAL GIVING STYLE (instant, no API) ───
  function getGivingStyle(a) {
    const priv = a.visibility === "private";
    const pub = a.visibility === "public";
    const deep = a.depth === "deep";
    const broad = a.depth === "broad";
    const firstStep = a.existingOrgs?.includes("first step") || a.existingOrgs?.includes("haven't given");
    const hometown = a.geo?.includes("hometown");
    
    if (firstStep && hometown) return "Hometown Starter";
    if (firstStep) return "New Path";
    if (pub && broad) return "Wide-Angle Giver";
    if (pub) return "Spotlight Giver";
    if (priv && deep && hometown) return "Community Anchor";
    if (priv && deep) return "Quiet Builder";
    if (priv) return "Silent Force";
    if (deep && hometown) return "Rooted Giver";
    if (deep) return "Deep Connector";
    if (broad) return "Explorer";
    return "Intentional Giver";
  }

  // ─── LOCALSTORAGE PERSISTENCE ───
  const STORAGE_KEY = "stewardhouse_state";
  
  const saveState = (updates) => {
    try {
      const existing = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ ...existing, ...updates }));
    } catch(e) {}
  };

  const loadState = () => {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch(e) { return {}; }
  };

  // Restore state on mount
  useEffect(() => {
    const saved = loadState();
    if (saved.answers) setAnswers(saved.answers);
    if (saved.givingStyle) setGivingStyle(saved.givingStyle);
    if (saved.gifts) setGifts(saved.gifts);
    if (saved.lessonsDone) setLD(saved.lessonsDone);
    if (saved.screen === "app") { setScreen("app"); setTab(saved.tab || "home"); }
    else if (saved.screen === "questions" || saved.screen === "privacy" || saved.screen === "letter") { setScreen(saved.screen); }
  }, []);

  // Save on meaningful state changes
  useEffect(() => { if (screen) saveState({ screen }); }, [screen]);
  useEffect(() => { if (answers) saveState({ answers }); }, [answers]);
  useEffect(() => { if (givingStyle) saveState({ givingStyle }); }, [givingStyle]);
  useEffect(() => { saveState({ gifts }); }, [gifts]);
  useEffect(() => { saveState({ lessonsDone }); }, [lessonsDone]);
  useEffect(() => { if (screen === "app") saveState({ tab }); }, [tab]);

  const onComplete = (a) => {
    setAnswers(a);
    const style = getGivingStyle(a);
    setGivingStyle(style);
    setCelMsg(getCelebration(a));
    saveState({ answers: a, givingStyle: style, screen: "celebration" });
    setScreen("celebration");
  };

  const [showBrowse, setShowBrowse] = useState(false); // Browse overlay during onboarding

  return (
    <div style={{ minHeight: "100vh", background: C.bg, fontFamily: f, color: C.text }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
      <div style={{ maxWidth: 520, margin: "0 auto", padding: "0 20px", minHeight: "100vh", paddingBottom: 70 }}>

        {/* Header */}
        {screen !== "celebration" && screen !== "landing" && (
          <div style={{ padding: "16px 0 10px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 13, fontWeight: 300, color: C.teal, letterSpacing: "0.25em", fontFamily: f }}>STEWARDHOUSE</span>
            <span style={{ fontSize: 12, color: C.muted }}>
              {showBrowse ? "Browse" : screen === "app" ? (tab === "home" ? "Home" : tab === "discover" ? "Discover" : tab === "learn" ? "Learn" : tab === "team" ? "Team" : tab === "gps" ? "My GPS" : "") : "Giving Studio"}
            </span>
          </div>
        )}

        {/* Browse overlay — visible during onboarding when Browse tab is tapped */}
        {screen !== "app" && showBrowse && (
          <DiscoverScreen answers={{}} onStartGPS={() => { setShowBrowse(false); if (screen === "landing") setScreen("letter"); else if (screen === "letter") setScreen("privacy"); }} />
        )}

        {/* Onboarding — hidden when browse overlay is active */}
        {!showBrowse && screen === "landing" && <Landing onContinue={() => setScreen("letter")} />}
        {!showBrowse && screen === "letter" && <Letter onBegin={() => setScreen("privacy")} onDemo={(id) => {
          const p = DEMO_PROFILES[id];
          if (!p) return;
          setAnswers(p.answers);
          setGivingStyle(p.givingStyle);
          setGifts(p.gifts);
          saveState({ answers: p.answers, givingStyle: p.givingStyle, gifts: p.gifts, screen: "app", tab: "home" });
          setScreen("app");
          setTab("home");
        }} />}
        {!showBrowse && screen === "privacy" && <Privacy onAck={() => setScreen("questions")} />}
        {!showBrowse && screen === "questions" && <Questions onComplete={onComplete} />}
        {screen === "celebration" && (
          <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: C.bg, display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100 }}>
            <GPSReveal answers={answers} givingStyle={givingStyle} celebMsg={celebMsg} onContinue={() => setScreen("app")} />
          </div>
        )}

        {/* Main App — post-GPS */}
        {screen === "app" && !showGive && !showSummary && !showFeedback && tab === "home" && <Home answers={answers} givingStyle={givingStyle} gifts={gifts} onGive={() => setShowGive(true)} onLearn={() => setTab("learn")} onGPS={() => setTab("gps")} onDiscover={() => setTab("discover")} onSummary={() => setShowSummary(true)} onFeedback={() => setShowFeedback(true)} />}
        {screen === "app" && showGive && <GiveScreen gifts={gifts} setGifts={setGifts} onBack={() => setShowGive(false)} />}
        {screen === "app" && showSummary && <GivingSummary gifts={gifts} answers={answers} onBack={() => setShowSummary(false)} />}
        {screen === "app" && showFeedback && <FeedbackForm answers={answers} gifts={gifts} lessonsDone={ld} onBack={() => setShowFeedback(false)} />}
        {screen === "app" && tab === "discover" && <DiscoverScreen answers={answers || {}} onStartGPS={() => {}} />}
        {screen === "app" && tab === "learn" && <LearnScreen done={lessonsDone} setDone={setLD} answers={answers} />}
        {screen === "app" && tab === "gps" && answers && <GPS answers={answers} style={givingStyle} onFeedback={() => setShowFeedback(true)} onEdit={() => {
          try { localStorage.setItem("sh_questions", JSON.stringify({ step: 0, answers })); } catch(e) {}
          setScreen("questions");
        }} />}
        {screen === "app" && tab === "team" && <TeamWorkspace grants={SAMPLE_GRANTS} />}
      </div>

      {/* ─── PERSISTENT NAV BAR ─── */}
      {screen !== "celebration" && screen !== "landing" && !(screen === "app" && showGive) && !(screen === "app" && showSummary) && !(screen === "app" && showFeedback) && (
        <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "#FFFFFF", borderTop: `0.5px solid ${C.border}`, display: "flex", justifyContent: "space-around", padding: "10px 0 max(10px, env(safe-area-inset-bottom))", zIndex: 50 }}>

          {/* Pre-GPS nav: Studio + Browse */}
          {screen !== "app" && [
            { id: "studio", l: "Studio", active: !showBrowse, action: () => setShowBrowse(false), svg: '<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>' },
            { id: "browse", l: "Browse", active: showBrowse, action: () => setShowBrowse(true), svg: '<circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>' },
          ].map(t => (
            <div key={t.id} onClick={t.action} style={{ textAlign: "center", cursor: "pointer", flex: 1, padding: "4px 0" }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={t.active ? C.teal : C.muted} strokeWidth="1.5" style={{ display: "block", margin: "0 auto" }} dangerouslySetInnerHTML={{ __html: t.svg }} />
              <div style={{ fontSize: 10, fontWeight: 400, letterSpacing: "0.12em", textTransform: "uppercase", marginTop: 4, color: t.active ? C.teal : C.muted, fontFamily: f }}>{t.l}</div>
            </div>
          ))}

          {/* Post-GPS nav */}
          {screen === "app" && [
            { id: "home", l: "Home", svg: '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>' },
            { id: "discover", l: "Discover", svg: '<circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>' },
            { id: "learn", l: "Learn", svg: '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>' },
            { id: "team", l: "Team", svg: '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>' },
            { id: "gps", l: "GPS", svg: '<circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>' },
          ].map(t => (
            <div key={t.id} onClick={() => { setShowSummary(false); setShowFeedback(false); setTab(t.id); }} style={{ textAlign: "center", cursor: "pointer", flex: 1, padding: "4px 0" }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={tab === t.id ? C.teal : C.muted} strokeWidth="1.5" style={{ display: "block", margin: "0 auto" }} dangerouslySetInnerHTML={{ __html: t.svg }} />
              <div style={{ fontSize: 10, fontWeight: 400, letterSpacing: "0.12em", textTransform: "uppercase", marginTop: 4, color: tab === t.id ? C.teal : C.muted, fontFamily: f }}>{t.l}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>

  <span style="font-size:9px;color:rgba(255,255,255,0.3);align-self:center;margin-right:4px">DEMO</span>
  <a href="index.html" style="padding:5px 12px;border-radius:50px;font-size:11px;font-weight:600;font-family:DM Sans,sans-serif;text-decoration:none;background:#4A7C6F;color:#fff;border:1px solid #4A7C6F">Individual</a>
  <a href="stewardhouse_enterprise.html" style="padding:5px 12px;border-radius:50px;font-size:11px;font-weight:600;font-family:DM Sans,sans-serif;text-decoration:none;background:transparent;color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.15)">Enterprise</a>
  <a href="stewardhouse_dashboard.html" style="padding:5px 12px;border-radius:50px;font-size:11px;font-weight:600;font-family:DM Sans,sans-serif;text-decoration:none;background:transparent;color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.15)">Dashboard</a>
  <a href="stewardhouse_onboarding.html" style="padding:5px 12px;border-radius:50px;font-size:11px;font-weight:600;font-family:DM Sans,sans-serif;text-decoration:none;background:transparent;color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.15)">Setup</a>
  <a href="stewardhouse_compliance.html" style="padding:5px 12px;border-radius:50px;font-size:11px;font-weight:600;font-family:DM Sans,sans-serif;text-decoration:none;background:transparent;color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.15)">Compliance</a>
</div>
