      <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>

            <div style={{fontSize:11,color:C.muted,width:50,flexShrink:0}}>{e.d}</div>

        </div>}
        {reportView==="readiness"&&<div>

        {[{q:"Q1 (Aug-Oct)",status:"complete",delivered:"Onboarding complete. Roster enrolled. 2 "+T().ws+"s delivered. GPS completion at "+Math.round(gpsD/tot*100)+"%.",adjusted:"Extended enrollment window by 2 weeks for late additions. Added extra check-in for inactive "+T().p+".",next:"Vetting "+T().ws+" in November. Mid-semester engagement push. First completion report."},{q:"Q2 (Nov-Jan)",status:"current",delivered:"In progress. 3rd "+T().ws+" upcoming. "+certD+" "+T().p+" "+T().cert+".",adjusted:"Shifted "+T().ws+" 3 content to focus on vetting after cohort feedback.",next:"Year-end review "+T().ws+". Pull semester completion data. Prep renewal materials."},{q:"Q3 (Feb-Apr)",status:"upcoming",delivered:"",adjusted:"",next:"Spring "+T().ws+"s. Capstone session. Graduating "+T().s+" transition prep."},{q:"Q4 (May-Jul)",status:"upcoming",delivered:"",adjusted:"",next:"Annual review. Contract renewal conversation. Next year planning."}].map(function(item,i){

        {[{item:"Financial literacy workshops",yours:"Your staff delivers",ours:"StewardHouse provides structured curriculum, facilitation, and measurable outcomes"},{item:"Alumni engagement",yours:"Your development office manages",ours:"StewardHouse builds the giving habit before graduation so alumni arrive pre-engaged"},{item:"Giving education",yours:"Your life skills program covers",ours:"StewardHouse adds 7-lesson depth with GPS, nonprofit discovery, and giving vehicles"},{item:"Endowment strategy",yours:"Your advancement team leads",ours:"StewardHouse provides projection modeling and alumni pipeline data to inform strategy"},{item:"Data and reporting",yours:"Your team compiles manually",ours:"StewardHouse generates real-time engagement data, completion tracking, and board-ready exports"}].map(function(row,i){return<div key={i} style={{padding:"10px 0",borderBottom:i<4?"1px solid "+C.border:"none"}}>

        </div>})}

  // ─── COMPLIANCE ───
  function renderCompliance() {
    const [cSearch,setCSearch] = useState("");
    const [cFilter,setCFilter] = useState("all");
    const [cSportF,setCSportF] = useState("all");
    const [showExcl,setShowExcl] = useState(false);
    const [addingOrg,setAddingOrg] = useState(false);
    const [cLookup,setCLookup] = useState(null);

    var excl = [{id:1,name:"Booster Club Foundation",ein:"04-9912345",reason:"Booster connection",flagged:"Sep 15, 2026"},{id:2,name:"Meridian Community Fund",ein:"04-7781234",reason:"Conflict of interest",flagged:"Sep 20, 2026"},{id:3,name:"Victory Sports Fund",ein:"04-5534567",reason:"Booster connection",flagged:"Oct 1, 2026"}];

    var pct=Math.round(certD/tot*100);
    var statusColor=pct>=80?C.green:pct>=50?C.amber:C.red;
    var statusBg=pct>=80?C.greenLt:pct>=50?C.amberLt:C.redLt;
    var overdue=athletes.filter(function(a){return a.st==="inactive"||a.st==="invited"}).length;

    var cFiltered=cFilter==="all"?athletes.slice():cFilter==="certified"?athletes.filter(function(a){return a.cert}):cFilter==="incomplete"?athletes.filter(function(a){return!a.cert&&a.les>0}):cFilter==="notstarted"?athletes.filter(function(a){return a.les===0}):athletes.filter(function(a){return a.st==="inactive"||a.st==="invited"});
    if(cSportF!=="all")cFiltered=cFiltered.filter(function(a){return a.sp===cSportF});
    if(cSearch)cFiltered=cFiltered.filter(function(a){return a.nm.toLowerCase().indexOf(cSearch.toLowerCase())>=0});

    return <div>
      {/* Status bar */}
      <div style={{background:statusBg,borderRadius:14,padding:"18px",border:"1px solid "+statusColor,marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:20,fontWeight:700,color:statusColor}}>{certD} of {tot} certified</div><div style={{fontSize:12,color:statusColor}}>{overdue>0?overdue+" overdue":"All on track"}</div></div>
          <div style={{width:48,height:48,borderRadius:"50%",background:statusColor,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:16,fontWeight:700,color:"#fff"}}>{pct}%</span></div>
        </div>
        <div style={{height:8,background:"rgba(255,255,255,.5)",borderRadius:4,marginTop:12,overflow:"hidden"}}><div style={{display:"flex",height:"100%"}}><div style={{width:Math.round(certD/tot*100)+"%",background:C.green}}/><div style={{width:Math.round(inProg/tot*100)+"%",background:C.teal}}/></div></div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:10,color:statusColor}}><span>{certD} certified</span><span>{inProg} in progress</span><span>{notStarted} not started</span></div>
      </div>

      <div style={{background:C.card,borderRadius:12,padding:"10px 14px",border:"1px solid "+C.border,marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:8,height:8,borderRadius:"50%",background:C.green}}/><span style={{fontSize:13,color:C.navy}}>All 7 modules approved</span></div><span style={{fontSize:11,color:C.muted}}>Sep 1, 2026</span></div>

      {/* Search and filters */}
      <div style={{position:"relative",marginBottom:8}}><input value={cSearch} onChange={function(e){setCSearch(e.target.value)}} placeholder={"Search "+T().s+"..."} style={{width:"100%",padding:"10px 14px 10px 36px",borderRadius:12,border:"1px solid "+C.border,fontSize:13,fontFamily:fn,background:C.card,boxSizing:"border-box"}}/><div style={{position:"absolute",left:12,top:11,fontSize:14,color:C.muted}}>{"\u2315"}</div></div>

      <div style={{display:"flex",gap:4,marginBottom:8,flexWrap:"wrap"}}>
        {[{id:"all",l:"All ("+tot+")"},{id:"certified",l:"Certified ("+certD+")"},{id:"incomplete",l:"In progress ("+inProg+")"},{id:"notstarted",l:"Not started ("+notStarted+")"},{id:"overdue",l:"Overdue ("+overdue+")"}].map(function(f){return<div key={f.id} className="btn-press" onClick={function(){setCFilter(f.id)}} style={{padding:"5px 10px",borderRadius:50,cursor:"pointer",fontSize:11,fontWeight:600,background:cFilter===f.id?C.navy:"transparent",color:cFilter===f.id?"#fff":C.light,border:"1px solid "+(cFilter===f.id?C.navy:C.border)}}>{f.l}</div>})}
      </div>

      <select value={cSportF} onChange={function(e){setCSportF(e.target.value)}} style={{padding:"5px 10px",borderRadius:8,border:"1px solid "+C.border,fontSize:11,fontFamily:fn,background:C.card,color:C.navy,marginBottom:8}}><option value="all">All sports</option>{sports.map(function(s){return<option key={s} value={s}>{s}</option>})}</select>

      {/* Compliance roster */}
      <div style={{display:"flex",alignItems:"center",padding:"0 14px 6px",gap:10}}><div style={{width:8}}/><div style={{flex:1,fontSize:10,color:C.muted,fontWeight:600}}>{(T().S||"").toUpperCase()}</div><div style={{width:40,textAlign:"center",fontSize:9,color:C.muted,fontWeight:600}}>STATUS</div><div style={{width:40,textAlign:"center",fontSize:9,color:C.muted,fontWeight:600}}>LESSONS</div></div>

      {cFiltered.map(function(a){var isOD=a.st==="inactive"||a.st==="invited";return<div key={a.id} style={{background:C.card,borderRadius:10,padding:"10px 14px",border:"1px solid "+(isOD?C.red+"40":C.border),marginBottom:4,display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:8,height:8,borderRadius:"50%",background:a.cert?C.green:isOD?C.red:a.les>0?C.teal:C.muted,flexShrink:0}}/>
        <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:500,color:C.navy}}>{a.nm}</div><div style={{fontSize:11,color:C.muted}}>{a.sp} {"\u00B7"} {a.yr}</div></div>
        <div style={{width:40,textAlign:"center"}}><div style={{fontSize:12,fontWeight:600,color:a.cert?C.green:isOD?C.red:C.navy}}>{a.cert?"Done":isOD?"Late":"OK"}</div></div>
        <div style={{width:40,textAlign:"center"}}><div style={{fontSize:12,fontWeight:600,color:C.navy}}>{a.les}/7</div></div>
      </div>})}

      {/* Pre-launch checklist */}
      <Card style={{background:C.cream,border:"1px solid "+C.border}}>
        <Label text="PRE-LAUNCH CHECKLIST"/>
        <div style={{fontSize:12,color:C.light,marginBottom:10,lineHeight:1.6}}>All items must be completed before the program goes live. This is a one-time review per contract period.</div>
        {[
          {id:"modules",label:"All 7 lesson modules reviewed and approved",done:true},
          {id:"orgs",label:"Initial organization exclusion list reviewed",done:true},
          {id:"data",label:"Data collection and retention policy confirmed",done:true},
          {id:"ncaa",label:INST.sector==="Athletics"?"NCAA disclosure policy reviewed":"Privacy and data handling policy reviewed",done:true},
          {id:"roster",label:"Roster uploaded and enrollment emails queued",done:true},
          {id:"signoff",label:"Program launch authorized by "+T().comp,done:true},
        ].map(function(item,i){return<div key={i} style={{display:"flex",gap:10,alignItems:"center",padding:"8px 0",borderBottom:i<5?"1px solid "+C.border:"none"}}>
          <div style={{width:20,height:20,borderRadius:4,background:item.done?C.greenLt:C.bg,border:"1.5px solid "+(item.done?C.green:C.border),display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{item.done&&<span style={{fontSize:10,color:C.green}}>{"✓"}</span>}</div>
          <div style={{fontSize:12,color:item.done?C.navy:C.muted}}>{item.label}</div>
        </div>})}
        <div style={{marginTop:10,background:C.greenLt,borderRadius:8,padding:"10px",border:"1px solid "+C.green}}>
          <div style={{fontSize:12,fontWeight:600,color:C.green}}>All pre-launch requirements met.</div>
          <div style={{fontSize:11,color:C.sage,marginTop:2}}>Signed off Sep 1, 2026. Program active.</div>
        </div>
      </Card>

      {/* Tools */}
      <div style={{marginTop:16}}>
        <Btn onClick={function(){setModal("export")}} bg={C.card} color={C.teal} border={"1px solid "+C.teal} style={{marginBottom:8}}>Export completion records (CSV)</Btn>

        <Card className="btn-press" onClick={function(){setShowExcl(!showExcl)}} style={{cursor:"pointer"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:14,fontWeight:600,color:C.navy}}>Org exclusion list</div><div style={{fontSize:11,color:C.muted}}>{excl.length} flagged</div></div><span style={{fontSize:14,color:C.muted}}>{showExcl?"\u2212":"+"}</span></div>
          {showExcl&&<div style={{marginTop:10,borderTop:"1px solid "+C.border,paddingTop:10}} onClick={function(e){e.stopPropagation()}}>
            {excl.map(function(org,i){return<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:i<excl.length-1?"1px solid "+C.border:"none"}}><div><div style={{fontSize:12,fontWeight:500,color:C.navy}}>{org.name}</div><div style={{fontSize:10,color:C.muted}}>EIN: {org.ein} {"\u00B7"} {org.reason}</div></div><div style={{fontSize:10,color:C.muted}}>{org.flagged}</div></div>})}
            <div className="btn-press" onClick={function(){setAddingOrg(!addingOrg)}} style={{marginTop:8,padding:"8px",borderRadius:8,border:"1px solid "+C.teal,textAlign:"center",cursor:"pointer"}}><span style={{fontSize:12,fontWeight:600,color:C.teal}}>+ Add organization</span></div>
            {addingOrg&&<div style={{marginTop:8}}><input placeholder="Organization name" style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid "+C.border,fontSize:12,fontFamily:fn,marginBottom:6,boxSizing:"border-box"}}/><input placeholder="EIN" style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid "+C.border,fontSize:12,fontFamily:fn,marginBottom:6,boxSizing:"border-box"}}/><select style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid "+C.border,fontSize:12,fontFamily:fn,marginBottom:6,background:C.card}}><option>Booster connection</option><option>Conflict of interest</option><option>Institutional policy</option></select><Btn onClick={function(){setAddingOrg(false);setModal("copied")}}>Flag organization</Btn></div>}
          </div>}
        </Card>

        <Card>
          <div style={{fontSize:14,fontWeight:600,color:C.navy,marginBottom:8}}>Athlete lookup</div>
          <input placeholder="Search by name..." style={{width:"100%",padding:"8px 12px",borderRadius:8,border:"1px solid "+C.border,fontSize:12,fontFamily:fn,boxSizing:"border-box"}} onChange={function(e){var q=e.target.value.toLowerCase();if(q.length<2){setCLookup(null);return}var f=athletes.find(function(a){return a.nm.toLowerCase().indexOf(q)>=0});setCLookup(f||"none")}}/>
          {cLookup&&cLookup!=="none"&&<div className="fade-in" style={{marginTop:10,padding:"10px",background:C.bg,borderRadius:8}}><div style={{fontSize:13,fontWeight:600,color:C.navy}}>{cLookup.nm}</div><div style={{fontSize:11,color:C.muted,lineHeight:1.8,marginTop:4}}><div>Sport: {cLookup.sp} {"\u00B7"} {cLookup.yr}</div><div>Enrolled: {cLookup.jd||"Pending"}</div><div>GPS: {cLookup.gps?"Complete":"Incomplete"}</div><div>Lessons: {cLookup.les}/7</div><div>Certified: {cLookup.cert?"Yes":"No"}</div><div>Last active: {cLookup.la}</div></div></div>}
          {cLookup==="none"&&<div className="fade-in" style={{marginTop:10,padding:"10px",background:C.bg,borderRadius:8,fontSize:12,color:C.muted}}>No record found. If this is a transfer, they may not have an existing account.</div>}
        </Card>
      </div>

      <div style={{marginTop:12,fontSize:10,color:C.muted,textAlign:"center",lineHeight:1.5}}>Participation data only. Individual giving data, GPS content, and personal reflections are not accessible from this view. Student-athlete privacy is protected by design.</div>
    </div>;
  }

  // ─── RENDER ───
  var renderTab = {overview:renderOverview,roster:renderRoster,reports:renderReports,compliance:renderCompliance,program:renderProgram}[tab] || renderOverview;

        <div><span style={{fontSize:11,fontWeight:300,color:C.tealLt,letterSpacing:"0.25em"}}>STEWARDHOUSE</span><span style={{fontSize:11,color:"rgba(255,255,255,.3)",margin:"0 8px"}}>|</span><span style={{fontSize:11,color:"rgba(255,255,255,.6)"}}>Institution Portal</span></div>
        <span style={{fontSize:11,color:"rgba(255,255,255,.5)"}}>{INST.name}</span>

        {DEMO_PROFILES.map(function(dp){return<div key={dp.id} className="btn-press" onClick={function(){switchDemo(dp.id)}} style={{padding:"5px 10px",borderRadius:50,cursor:"pointer",fontSize:10,fontWeight:600,background:demoProfile===dp.id?C.navy:"transparent",color:demoProfile===dp.id?"#fff":C.muted,border:"1px solid "+(demoProfile===dp.id?C.navy:C.border),whiteSpace:"nowrap",flexShrink:0}}>{dp.label}</div>})}
      </div>
    </div>
    <div style={{background:C.card,borderBottom:"1px solid "+C.border,padding:"0 20px",overflowX:"auto"}}>
      <div style={{maxWidth:520,margin:"0 auto",display:"flex"}}>
        {tabs.map(function(t){return<div key={t.id} className="btn-press" onClick={function(){setTab(t.id);setSelected(null);setReportView(null)}} style={{padding:"11px 14px",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:fn,color:tab===t.id?C.teal:C.muted,borderBottom:tab===t.id?"2px solid "+C.teal:"2px solid transparent",whiteSpace:"nowrap"}}>{t.l}</div>})}

    </Modal>

    <Modal show={modal==="certs"} onClose={function(){setModal(null)}} title="Certificates">
      {athletes.filter(function(a){return a.cert}).length===0?<div style={{fontSize:13,color:C.muted,textAlign:"center",padding:"20px 0"}}>No certificates earned yet.</div>:

    {athletes.filter(function(a){return a.cert}).map(function(a){return<Modal key={a.id} show={modal==="cert-"+a.id} onClose={function(){setModal(null)}} title="Certificate"><Certificate athlete={a}/></Modal>})}

        <div>Name,Sport,Year,GPS,Lessons,Certified,Last Active</div>
        {athletes.slice(0,5).map(function(a,i){return <div key={i}>{a.nm+","+a.sp+","+a.yr+","+(a.gps?"Yes":"No")+","+a.les+"/7,"+(a.cert?"Yes":"No")+","+a.la}</div>})}

        <div style={{fontWeight:600,color:C.navy,marginBottom:8}}>Week 12 — {INST.name}</div>
        {certD} athletes certified. {active} active. {inactive} inactive. {tGi} gifts logged. Next workshop: {(WORKSHOPS.find(function(w){return w.status==="upcoming"})||{}).date||"TBD"}. Engagement: {ENGAGEMENT[ENGAGEMENT.length-1]}% weekly active (up from {ENGAGEMENT[0]}%).
      </div>
      <Btn onClick={function(){setModal("copied")}}>Send to team</Btn>
    </Modal>

    <Modal show={modal==="copied"} onClose={function(){setModal(null)}} title="Done">
      <div style={{textAlign:"center",padding:"20px 0"}}>
        <div style={{width:48,height:48,borderRadius:"50%",background:C.greenLt,border:"2px solid "+C.green,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px"}}><span style={{fontSize:20,color:C.green}}>{"\u2713"}</span></div>
        <div style={{fontSize:14,fontWeight:600,color:C.navy}}>Content ready</div>
        <div style={{fontSize:12,color:C.muted,marginTop:4}}>In the full release, this downloads directly or sends via email.</div>
      </div>
    </Modal>
  </div>;
}

ReactDOM.render(<Portal/>,document.getElementById('root'));
</script>


</body>
</html>
