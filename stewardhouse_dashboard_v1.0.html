function fK(n){if(!n||isNaN(n))return"$0";if(n>=1000000)return"$"+(n/1000000).toFixed(1)+"M";if(n>=1000)return"$"+Math.round(n/1000)+"K";return"$"+Math.round(n).toLocaleString()}

function Card(p){return<div className={"fade-in"+(p.press?" btn-press":"")} style={{background:C.card,borderRadius:14,padding:"16px",border:"1px solid "+C.border,marginBottom:10,cursor:p.onClick?"pointer":"default",...(p.style||{})}} onClick={p.onClick}>{p.children}</div>}

function Spark(p){var d=p.data||[];var mx=Math.max.apply(null,d)||1;return<div style={{display:"flex",alignItems:"flex-end",gap:1,height:24}}>{d.map(function(v,i){return<div key={i} style={{flex:1,height:Math.max((v/mx)*20,1)+"px",background:i===d.length-1?C.teal:C.tealLt,borderRadius:1}}/>})}</div>}

// ─── ENDOWMENT MODELER ───
function EndowModeler(p) {
  const [grads,setGrads]=useState(p.grads||125);
  const [conv,setConv]=useState(30);
  const [avgGift,setAvgGift]=useState(1000);
  const [yrs,setYrs]=useState(20);
  const [endPct,setEndPct]=useState(50);
  const [drawRate,setDrawRate]=useState(4.5);
  const [retRate,setRetRate]=useState(7);
  const [contractAmt,setContractAmt]=useState(p.contract||85000);
  const [majorGift,setMajorGift]=useState(3000000);
  const [majorDonors,setMajorDonors]=useState(3);
  const [majorYrs,setMajorYrs]=useState(2);
  const [projYrs,setProjYrs]=useState(10);
  const [corpSp,setCorpSp]=useState(15000000);
  const [corpPct,setCorpPct]=useState(3);

  var shC=contractAmt*0.1;var dPC=Math.round(grads*conv/100);var gTE=avgGift*endPct/100;
  var corpus=0,tC=0,tD=0,pts=[];
  for(var y=1;y<=projYrs;y++){var aC=Math.min(y,yrs);var aD=aC*dPC;var alC=aD*gTE;var mj=y<=majorYrs?majorGift*majorDonors/majorYrs:0;var co=corpSp*corpPct/100;var gr=corpus*retRate/100;var dr=corpus*drawRate/100;corpus=corpus+(gr-dr)+alC+shC+mj+co;tC+=alC+shC+mj+co;tD+=dr;pts.push({y:y,cp:Math.round(corpus),dr:Math.round(dr)})}
  var fin=pts.length>0?pts[pts.length-1]:{cp:0,dr:0};
  var maxCp=Math.max.apply(null,pts.map(function(p){return p.cp}))||1;

  return <div>
    <Card style={{background:C.navy,border:"none"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}><div><div style={{fontSize:9,color:"rgba(255,255,255,.5)",letterSpacing:"0.1em",textTransform:"uppercase"}}>CORPUS AT YEAR {projYrs}</div><div style={{fontSize:32,fontWeight:700,color:"#fff"}}>{fK(fin.cp)}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:9,color:"rgba(255,255,255,.5)"}}>ANNUAL DRAW</div><div style={{fontSize:20,fontWeight:600,color:C.tealLt}}>{fK(fin.dr)}/yr</div></div></div></Card>
    <div style={{display:"flex",alignItems:"flex-end",gap:2,height:60,marginBottom:12}}>{pts.map(function(p,i){return<div key={i} style={{flex:1,height:Math.max((p.cp/maxCp)*55,2)+"px",background:C.teal,borderRadius:2}}/>})}</div>
    <Card><Label text="ALUMNI PIPELINE"/>
      <Sld label="Graduates/year" val={grads} onChange={setGrads} min={25} max={300} step={5}/>
      <Sld label="Conversion" val={conv} onChange={setConv} min={5} max={60} fmt={function(v){return v+"%"}}/>
      <Sld label="Avg gift" val={avgGift} onChange={setAvgGift} min={100} max={10000} step={100} fmt={fK}/>
      <Sld label="To endowment" val={endPct} onChange={setEndPct} min={10} max={100} step={5} fmt={function(v){return v+"%"}}/>
    </Card>
    <Card><Label text="ENDOWMENT"/>
      <Sld label="Return" val={retRate} onChange={setRetRate} min={3} max={12} step={.5} fmt={function(v){return v+"%"}}/>
      <Sld label="Draw" val={drawRate} onChange={setDrawRate} min={2} max={8} step={.5} fmt={function(v){return v+"%"}}/>
      <Sld label="Timeline" val={projYrs} onChange={setProjYrs} min={3} max={25} fmt={function(v){return v+"yr"}}/>
    </Card>
    <Card><Label text="MAJOR GIFTS"/>
      <Sld label="Per donor" val={majorGift} onChange={setMajorGift} min={0} max={10000000} step={250000} fmt={fK}/>
      <Sld label="Donors" val={majorDonors} onChange={setMajorDonors} min={0} max={10}/>
    </Card>
    <Card><Label text="CORPORATE"/>
      <Sld label="Total sponsorship" val={corpSp} onChange={setCorpSp} min={0} max={50000000} step={1000000} fmt={fK}/>
      <Sld label="To endowment" val={corpPct} onChange={setCorpPct} min={0} max={10} step={.5} fmt={function(v){return v+"%"}}/>
    </Card>
    <div style={{fontSize:9,color:C.muted,textAlign:"center"}}>Planning illustration. Not financial advice. Institutional inputs must come from your endowment manager.</div>
    <div style={{marginTop:12}}><Btn onClick={p.onBack} bg={C.card} color={C.teal} border={"1px solid "+C.teal}>{"\u2190"} Back to institution</Btn></div>
  </div>;
}

// ─── MAIN DASHBOARD ───
function Dashboard() {
  const [section,setSection]=useState("thisweek");
  const [pipelineData,setPipelineData]=useState(PIPELINE);
  const [showAddProspect,setShowAddProspect]=useState(false);

  const [selInst,setSelInst]=useState(null);
  const [selEvent,setSelEvent]=useState(null);
  const [showModeler,setShowModeler]=useState(false);
  const [filter,setFilter]=useState("all");
  const [showLogForm,setShowLogForm]=useState(false);
  const [logNote,setLogNote]=useState("");
  const [logType,setLogType]=useState("Call");
  const [commLogs,setCommLogs]=useState(COMM_LOG);
  const [calMonth,setCalMonth]=useState(10);
  const [dashSearch,setDashSearch]=useState(""); // 0-indexed, 10=November

  var sectors=[];INST.forEach(function(i){if(sectors.indexOf(i.sector)===-1)sectors.push(i.sector)});
  var filteredInst=filter==="all"?INST:INST.filter(function(i){return i.sector===filter});

  function addLog(instId){
    if(!logNote.trim())return;
    var updated=Object.assign({},commLogs);
    if(!updated[instId])updated[instId]=[];
    updated[instId]=[{date:"Oct 21",type:logType,note:logNote.trim()}].concat(updated[instId]);
    setCommLogs(updated);
    setLogNote("");setShowLogForm(false);
  }

  // COMPUTE THIS WEEK PRIORITIES
  var priorities=[];
  INST.forEach(function(i){
    if(i.health==="red")priorities.push({type:"risk",icon:"\u26A0",color:C.red,text:i.name+" \u2014 "+i.healthReason,instId:i.id});
    if(i.lastTouchDays>21)priorities.push({type:"touch",icon:"\u260E",color:C.amber,text:i.name+" \u2014 no contact in "+i.lastTouchDays+" days",instId:i.id});
    if(i.renewDays<120)priorities.push({type:"renew",icon:"\u21BB",color:C.teal,text:i.name+" renewal in "+i.renewDays+" days \u2014 prep summary",instId:i.id});
    if(i.compStatus==="pending")priorities.push({type:"comp",icon:"\u2731",color:C.amber,text:i.name+" \u2014 compliance review pending",instId:i.id});
  });
  PIPELINE.forEach(function(p){if(p.days>14)priorities.push({type:"pipe",icon:"\u2192",color:C.navy,text:p.name+" \u2014 "+p.stage+" stalled "+p.days+" days",instId:null})});
  var upcomingEvents=EVENTS.filter(function(e){return e.date<"2026-12-01"});
  if(upcomingEvents.length>0)priorities.push({type:"event",icon:"\u2606",color:C.teal,text:"Next: "+upcomingEvents[0].title+" at "+upcomingEvents[0].inst+" ("+upcomingEvents[0].label+")",instId:null});
  priorities=priorities.slice(0,6);

  // ─── INSTITUTION DETAIL ───
  if(selInst){
    var inst=selInst;
    var logs=(commLogs[inst.id]||[]);

    if(showModeler&&inst.sector==="Athletics") return <div>
      <div style={{position:"sticky",top:0,background:C.bg,paddingTop:4,paddingBottom:8,zIndex:10}}>
        <div className="btn-press" onClick={function(){setShowModeler(false)}} style={{fontSize:13,color:C.teal,cursor:"pointer"}}>{"\u2190"} Back to {inst.name}</div>
      </div>
      <div style={{fontSize:10,color:C.bronze,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:4}}>ENDOWMENT MODELER</div>

          <div style={{width:24,height:24,borderRadius:"50%",background:w.s==="done"?C.greenLt:w.s==="next"?C.amberLt:C.bg,border:"1.5px solid "+(w.s==="done"?C.green:w.s==="next"?C.amber:C.border),display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{w.s==="done"?<span style={{fontSize:10,color:C.green}}>{"\u2713"}</span>:<span style={{fontSize:10,fontWeight:600,color:w.s==="next"?C.amber:C.muted}}>{w.n}</span>}</div>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500,color:w.s==="future"?C.muted:C.navy}}>{w.t}</div><div style={{fontSize:11,color:C.muted}}>{w.d}{w.a?" \u00B7 "+w.a+" attended":""}</div></div>
          {w.s==="next"&&<div style={{padding:"3px 8px",borderRadius:50,background:C.amberLt,border:"1px solid "+C.amber}}><span style={{fontSize:10,fontWeight:600,color:C.amber}}>Next</span></div>}
        </div>})}
      </Card>

      <Card>
        <Label text="QUICK REPORTS"/>
        {[{t:"Program summary",d:"Narrative for leadership"},{t:"Completion records",d:"CSV for compliance"},{t:T(inst.sector).Workshop+" attendance",d:"All sessions"}].map(function(r,i){return<div key={i} className="btn-press" style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:i<2?"1px solid "+C.border:"none",cursor:"pointer"}}><div><div style={{fontSize:13,fontWeight:500,color:C.navy}}>{r.t}</div><div style={{fontSize:11,color:C.muted}}>{r.d}</div></div><div style={{padding:"4px 10px",borderRadius:8,background:C.tealLt,border:"1px solid "+C.teal}}><span style={{fontSize:10,fontWeight:600,color:C.teal}}>Pull</span></div></div>})}

      <Card style={{background:inst.renewDays<120?C.amberLt:C.bg,border:"1px solid "+(inst.renewDays<120?C.amber:C.border)}}>

      </div>
      <div style={{marginTop:8}}><Btn onClick={function(){window.open("stewardhouse_enterprise_v1.0.html","_blank")}} bg={C.card} color={C.teal} border={"1px solid "+C.teal}>Open institution portal</Btn></div>
    </div>;

  // (shown via modal)

  // ─── SECTIONS ───
  var navItems=[{id:"thisweek",l:"This week"},{id:"portfolio",l:"Portfolio"},{id:"calendar",l:"Calendar"},{id:"pipeline",l:"Pipeline"},{id:"metrics",l:"Metrics"}];

  return <div>
    <div style={{position:"relative",marginBottom:12}}>
      <input value={dashSearch} onChange={function(e){setDashSearch(e.target.value)}} placeholder="Search institutions, prospects, events..." style={{width:"100%",padding:"10px 14px 10px 36px",borderRadius:12,border:"1px solid "+C.border,fontSize:13,fontFamily:fn,background:C.card,boxSizing:"border-box"}}/>
      <div style={{position:"absolute",left:12,top:11,fontSize:14,color:C.muted}}>{"\u2315"}</div>
      {dashSearch&&<div className="btn-press" onClick={function(){setDashSearch("")}} style={{position:"absolute",right:12,top:10,fontSize:14,color:C.muted,cursor:"pointer"}}>{"\u2715"}</div>}
      {dashSearch.length>1&&<Card style={{position:"relative",zIndex:10,marginTop:4}}>
        {INST.filter(function(i){return i.name.toLowerCase().indexOf(dashSearch.toLowerCase())>=0||i.sector.toLowerCase().indexOf(dashSearch.toLowerCase())>=0}).map(function(i){return<div key={i.id} className="btn-press" onClick={function(){setSelInst(i);setDashSearch("")}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid "+C.border,cursor:"pointer"}}><div><div style={{fontSize:13,fontWeight:500,color:C.navy}}>{i.name}</div><div style={{fontSize:11,color:C.muted}}>{T(i.sector).org}</div></div><HDot h={i.health}/></div>})}
        {PIPELINE.filter(function(p){return p.name.toLowerCase().indexOf(dashSearch.toLowerCase())>=0}).map(function(p){return<div key={p.name} className="btn-press" onClick={function(){setSection("pipeline");setDashSearch("")}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",cursor:"pointer"}}><div><div style={{fontSize:13,fontWeight:500,color:C.navy}}>{p.name}</div><div style={{fontSize:11,color:C.muted}}>Pipeline {"\u00B7"} {p.stage}</div></div><span style={{fontSize:11,color:C.gold}}>{fK(p.value)}</span></div>})}
        {INST.filter(function(i){return i.name.toLowerCase().indexOf(dashSearch.toLowerCase())>=0}).length===0&&PIPELINE.filter(function(p){return p.name.toLowerCase().indexOf(dashSearch.toLowerCase())>=0}).length===0&&<div style={{fontSize:12,color:C.muted,textAlign:"center",padding:"8px 0"}}>No results for "{dashSearch}"</div>}
      </Card>}
    </div>

    <div style={{display:"flex",gap:4,marginBottom:14,overflowX:"auto"}}>
      {navItems.map(function(s){return<div key={s.id} className="btn-press" onClick={function(){setSection(s.id)}} style={{padding:"6px 14px",borderRadius:50,cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:fn,background:section===s.id?C.navy:"transparent",color:section===s.id?"#fff":C.light,border:"1px solid "+(section===s.id?C.navy:C.border),whiteSpace:"nowrap",flexShrink:0}}>{s.l}</div>})}
    </div>

    {/* ─── THIS WEEK ─── */}
    {section==="thisweek"&&<div>
      <div style={{fontSize:10,color:C.bronze,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:4}}>PRIORITIES THIS WEEK</div>

      {priorities.map(function(p,i){return<Card key={i} press onClick={function(){if(p.instId){setSelInst(INST.find(function(x){return x.id===p.instId}));setSection("thisweek")}}}>

          {p.instId&&<div style={{color:C.muted,fontSize:14}}>{"\u2192"}</div>}
        </div>
      </Card>})}

      {/* Quick stats */}
      <div style={{display:"flex",gap:8,marginTop:6}}>
        {[{v:INST.length,l:"Clients",c:C.navy},{v:totalAthletes,l:"Participants",c:C.teal},{v:fK(totalContract),l:"ARR",c:C.gold},{v:fK(pipelineValue),l:"Pipeline",c:C.sage}].map(function(s,i){return<div key={i} style={{flex:1,background:C.card,borderRadius:12,padding:"12px 8px",border:"1px solid "+C.border,textAlign:"center"}}><div style={{fontSize:18,fontWeight:700,color:s.c}}>{typeof s.v==="number"?s.v:s.v}</div><div style={{fontSize:9,color:C.muted,textTransform:"uppercase",marginTop:2}}>{s.l}</div></div>})}
      </div>
    </div>}

    {/* ─── PORTFOLIO ─── */}
    {section==="portfolio"&&<div>
      <div style={{display:"flex",gap:4,marginBottom:10}}>
        {["all"].concat(sectors).map(function(s){return<div key={s} className="btn-press" onClick={function(){setFilter(s)}} style={{padding:"4px 10px",borderRadius:50,cursor:"pointer",fontSize:11,fontWeight:600,background:filter===s?C.navy:"transparent",color:filter===s?"#fff":C.light,border:"1px solid "+(filter===s?C.navy:C.border),textTransform:"capitalize"}}>{s==="all"?"All":s}</div>})}
      </div>
      <Label text={"CLIENTS ("+filteredInst.length+")"}/>
      {filteredInst.sort(function(a,b){var o={red:0,amber:1,green:2};return(o[a.health]||2)-(o[b.health]||2)}).map(function(inst){return<Card key={inst.id} press onClick={function(){setSelInst(inst)}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}><HDot h={inst.health}/><div><div style={{fontSize:14,fontWeight:600,color:C.navy}}>{inst.name}</div><div style={{fontSize:11,color:C.muted}}>{T(inst.sector).org} {"\u00B7"} {inst.tier} {"\u00B7"} {fK(inst.contract)}/yr</div></div></div>
          <div style={{textAlign:"right"}}><div style={{fontSize:14,fontWeight:600,color:C.teal}}>{inst.gpsRate}%</div><div style={{fontSize:9,color:C.muted}}>GPS</div></div>

      </Card>})}
    </div>}

    {/* ─── CALENDAR ─── */}
    {section==="calendar"&&<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div className="btn-press" onClick={function(){setCalMonth(Math.max(calMonth-1,9))}} style={{padding:"6px 12px",borderRadius:8,border:"1px solid "+C.border,cursor:"pointer",fontSize:14,color:C.muted}}>{"\u2190"}</div>
        <div style={{fontSize:14,fontWeight:600,color:C.navy}}>{["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][calMonth]} {calMonth<6?2027:2026}</div>
        <div className="btn-press" onClick={function(){setCalMonth(Math.min(calMonth+1,15))}} style={{padding:"6px 12px",borderRadius:8,border:"1px solid "+C.border,cursor:"pointer",fontSize:14,color:C.muted}}>{"\u2192"}</div>

      {/* Calendar grid */}
      {(function(){

        var cells=[];for(var b=0;b<firstDay;b++)cells.push({d:0});for(var d=1;d<=daysInMonth;d++)cells.push({d:d});

          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>

          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:14}}>

              var hasEvt=evts.length>0;
              return<div key={i} className={hasEvt?"btn-press":""} onClick={hasEvt?function(){setSelEvent(evts[0])}:undefined} style={{textAlign:"center",padding:"8px 4px",borderRadius:8,background:hasEvt?C.tealLt:C.card,border:"1px solid "+(hasEvt?C.teal:C.border),cursor:hasEvt?"pointer":"default"}}>
                <div style={{fontSize:12,fontWeight:hasEvt?600:400,color:hasEvt?C.teal:C.navy}}>{c.d}</div>
                {hasEvt&&<div style={{width:4,height:4,borderRadius:2,background:evts[0].type==="Renewal"?C.amber:C.teal,margin:"2px auto 0"}}/>}
              </div>
            })}
          </div>
        </div>;
      })()}

      {/* Event list for this month */}

      {EVENTS.filter(function(e){var eMo=parseInt(e.date.split("-")[1])-1;var eYr=parseInt(e.date.split("-")[0]);return(calMonth>=12?(eMo===(calMonth-12)&&eYr===2027):(eMo===calMonth&&eYr===2026))}).map(function(e,i){
        return<Card key={i} press onClick={function(){setSelEvent(e)}}>
          <div style={{display:"flex",gap:12,alignItems:"center"}}>
            <div style={{minWidth:50}}><div style={{fontSize:14,fontWeight:600,color:C.navy}}>{e.label.split(" ")[0]}</div><div style={{fontSize:11,color:C.muted}}>{e.label.split(" ")[1]}</div></div>

            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500,color:C.navy}}>{e.title}</div><div style={{fontSize:11,color:C.muted}}>{e.inst}</div></div>

          </div>
        </Card>
      })}
    </div>}

    {/* ─── PIPELINE ─── */}

        <div style={{flex:1,background:C.card,borderRadius:12,padding:"14px",border:"1px solid "+C.border,textAlign:"center"}}><div style={{fontSize:22,fontWeight:700,color:C.gold}}>{fK(pipelineData.reduce(function(s,p){return s+p.value},0))}</div><div style={{fontSize:9,color:C.muted,textTransform:"uppercase"}}>Pipeline value</div></div>
      </div>
      <div style={{display:"flex",gap:4,marginBottom:14}}>{stageOrder.map(function(st){var ct=pipelineData.filter(function(p){return p.stage===st}).length;return<div key={st} style={{flex:1,textAlign:"center",padding:"8px 4px",borderRadius:8,background:ct>0?stageColors[st]+"18":C.bg,border:"1px solid "+(ct>0?stageColors[st]+"40":C.border)}}><div style={{fontSize:16,fontWeight:700,color:ct>0?stageColors[st]:C.muted}}>{ct}</div><div style={{fontSize:8,color:C.muted}}>{st}</div></div>})}</div>
      <Label text="PIPELINE PROSPECTS"/>
      {pipelineData.map(function(p,i){return<Card key={i} press>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}><div><div style={{fontSize:14,fontWeight:600,color:C.navy}}>{p.name}</div><div style={{fontSize:11,color:C.muted}}>{p.sector} {"\u00B7"} {p.contact}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:14,fontWeight:600,color:C.gold}}>{fK(p.value)}</div><div style={{padding:"2px 8px",borderRadius:50,background:(stageColors[p.stage]||C.muted)+"18",display:"inline-block",marginTop:2}}><span style={{fontSize:10,fontWeight:600,color:stageColors[p.stage]}}>{p.stage}</span></div></div></div>
        <div style={{fontSize:11,color:p.days>14?C.amber:C.light,marginBottom:6}}>{p.lastAction}{p.days>14?" \u2014 "+p.days+" days":"" }</div>
        <div style={{display:"flex",gap:4}}>{stageOrder.map(function(st){var idx=stageOrder.indexOf(st);var cur=stageOrder.indexOf(p.stage);return<div key={st} style={{flex:1,height:4,borderRadius:2,background:idx<cur?C.teal:idx===cur?C.navy:C.border}}/>})}</div>
      </Card>})}
    </div>}

    {/* ─── METRICS ─── */}
    {section==="metrics"&&<div>
      <Card style={{background:C.navy,border:"none"}}><Label text="BUSINESS OVERVIEW"/><div style={{display:"flex",gap:14,flexWrap:"wrap"}}>{[{v:fK(totalContract),l:"Annual revenue",c:"#fff"},{v:fK(Math.round(totalContract/4)),l:"Quarterly billing",c:C.tealLt},{v:fK(pipelineValue),l:"Pipeline",c:C.gold},{v:fK(totalEndow),l:"Endowment (athletics)",c:C.tealLt}].map(function(s,i){return<div key={i} style={{minWidth:60}}><div style={{fontSize:18,fontWeight:700,color:s.c}}>{s.v}</div><div style={{fontSize:9,color:"rgba(255,255,255,.5)"}}>{s.l}</div></div>})}</div></Card>

      <Card>
        <Label text="REVENUE CONCENTRATION"/>
        {INST.sort(function(a,b){return b.contract-a.contract}).map(function(inst){var pct=Math.round(inst.contract/totalContract*100);return<div key={inst.id} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:12,color:C.navy}}>{inst.name}</span><span style={{fontSize:12,fontWeight:600,color:pct>40?C.red:C.navy}}>{pct}% ({fK(inst.contract)})</span></div><div style={{height:6,background:C.border,borderRadius:3}}><div style={{width:pct+"%",height:"100%",background:pct>40?C.red:C.teal,borderRadius:3}}/></div></div>})}
        {INST.some(function(i){return i.contract/totalContract>0.4})&&<div style={{fontSize:11,color:C.red,marginTop:6}}>Concentration risk: one client exceeds 40% of revenue.</div>}
      </Card>

      <Card>
        <Label text="INVOICING STATUS"/>
        {INST.map(function(inst){var paid=inst.invoices.filter(function(v){return v.status==="paid"}).length;return<div key={inst.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid "+C.border}}>
          <div><div style={{fontSize:13,fontWeight:500,color:C.navy}}>{inst.name}</div><div style={{fontSize:11,color:C.muted}}>{paid} of {inst.invoices.length} paid</div></div>
          <div style={{display:"flex",gap:4}}>{inst.invoices.map(function(inv,i){return<div key={i} style={{width:12,height:12,borderRadius:3,background:inv.status==="paid"?C.green:inv.status==="sent"?C.amber:C.border}}/>})}</div>
        </div>})}
      </Card>

      <Card>
        <Label text="REVENUE FORECAST"/>
        {(function(){
          var currentARR=totalContract;
          var renewalRate=0.85;
          var pipeConversion=0.3;
          var projRenewals=Math.round(currentARR*renewalRate);
          var projPipeline=Math.round(pipelineValue*pipeConversion);
          var projTotal=projRenewals+projPipeline;
          return <div>
            <div style={{display:"flex",gap:8,marginBottom:10}}>
              <div style={{flex:1,background:C.bg,borderRadius:8,padding:"10px",textAlign:"center"}}><div style={{fontSize:16,fontWeight:700,color:C.navy}}>{fK(currentARR)}</div><div style={{fontSize:9,color:C.muted}}>Current ARR</div></div>
              <div style={{flex:1,background:C.tealLt,borderRadius:8,padding:"10px",textAlign:"center",border:"1px solid "+C.teal}}><div style={{fontSize:16,fontWeight:700,color:C.teal}}>{fK(projTotal)}</div><div style={{fontSize:9,color:C.sage}}>Projected next year</div></div>
            </div>
            <div style={{fontSize:12,color:C.light,lineHeight:1.7}}>
              Renewals at 85% retention: {fK(projRenewals)}. Pipeline conversion at 30%: {fK(projPipeline)}. Combined: {fK(projTotal)} ({projTotal>currentARR?"+"+Math.round((projTotal-currentARR)/currentARR*100)+"%":Math.round((projTotal-currentARR)/currentARR*100)+"%"} vs. current).
            </div>
            <div style={{marginTop:8,height:24,display:"flex",gap:2,borderRadius:4,overflow:"hidden"}}>
              <div style={{width:Math.round(projRenewals/projTotal*100)+"%",background:C.teal,borderRadius:"4px 0 0 4px"}}/>
              <div style={{width:Math.round(projPipeline/projTotal*100)+"%",background:C.gold,borderRadius:"0 4px 4px 0"}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}><span style={{fontSize:10,color:C.teal}}>Renewals {Math.round(projRenewals/projTotal*100)}%</span><span style={{fontSize:10,color:C.gold}}>Pipeline {Math.round(projPipeline/projTotal*100)}%</span></div>
          </div>;
        })()}
      </Card>

      <Card>
        <Label text="PORTFOLIO HEALTH"/>
        <div style={{display:"flex",gap:8}}>{[{l:"Healthy",c:INST.filter(function(i){return i.health==="green"}).length,cl:C.green,bg:C.greenLt},{l:"Watch",c:INST.filter(function(i){return i.health==="amber"}).length,cl:C.amber,bg:C.amberLt},{l:"At risk",c:INST.filter(function(i){return i.health==="red"}).length,cl:C.red,bg:C.redLt}].map(function(h){return<div key={h.l} style={{flex:1,background:h.bg,borderRadius:10,padding:"12px",textAlign:"center",border:"1px solid "+h.cl+"40"}}><div style={{fontSize:20,fontWeight:700,color:h.cl}}>{h.c}</div><div style={{fontSize:10,color:h.cl}}>{h.l}</div></div>})}</div>
      </Card>
    </div>}

    {/* EVENT DETAIL MODAL */}
    <Modal show={!!selEvent} onClose={function(){setSelEvent(null)}} title={selEvent?selEvent.title:""}>
      {selEvent&&<div>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          <div style={{padding:"4px 12px",borderRadius:50,background:selEvent.type==="Renewal"?C.amberLt:C.tealLt,border:"1px solid "+(selEvent.type==="Renewal"?C.amber:C.teal)}}><span style={{fontSize:11,fontWeight:600,color:selEvent.type==="Renewal"?C.amber:C.teal}}>{selEvent.type}</span></div>
          <div style={{fontSize:13,color:C.navy,fontWeight:500}}>{selEvent.label} {"\u00B7"} {selEvent.inst}</div>
        </div>
        <Card style={{background:C.cream,border:"1px solid "+C.border}}>
          <Label text="PREP NOTES"/>
          <div style={{fontSize:13,color:C.light,lineHeight:1.7}}>{selEvent.prep}</div>
        </Card>
        <Card>
          <Label text="PEOPLE TO LOOP IN"/>
          {selEvent.people.map(function(p,i){return<div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0"}}><div style={{width:8,height:8,borderRadius:"50%",background:C.teal}}/><span style={{fontSize:13,color:C.navy}}>{p}</span></div>})}
        </Card>
        {(function(){var instMatch=INST.find(function(i){return i.name===selEvent.inst});if(!instMatch)return null;var logs2=(commLogs[instMatch.id]||[]);return<Card>
          <Label text="PAST COMMUNICATIONS"/>
          {logs2.length===0?<div style={{fontSize:12,color:C.muted,fontStyle:"italic"}}>No prior touchpoints.</div>:
          logs2.map(function(e,i){return<div key={i} style={{display:"flex",gap:10,padding:"6px 0",borderBottom:i<logs2.length-1?"1px solid "+C.border:"none"}}><div style={{fontSize:11,color:C.muted,width:46,flexShrink:0}}>{e.date}</div><div style={{padding:"2px 8px",borderRadius:50,background:C.tealLt,flexShrink:0}}><span style={{fontSize:10,fontWeight:600,color:C.teal}}>{e.type}</span></div><div style={{fontSize:12,color:C.navy}}>{e.note}</div></div>})}
        </Card>})()}
      </div>}
    </Modal>
  </div>;
}

function App(){return<div style={{minHeight:"100vh",background:C.bg,fontFamily:fn}}>
  <div style={{background:C.navy,padding:"14px 20px 10px"}}><div style={{maxWidth:520,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><span style={{fontSize:11,fontWeight:300,color:C.tealLt,letterSpacing:"0.25em"}}>STEWARDHOUSE</span><span style={{fontSize:11,color:"rgba(255,255,255,.3)",margin:"0 8px"}}>|</span><span style={{fontSize:11,color:"rgba(255,255,255,.6)"}}>Command Center</span><span style="font-size:9px;color:rgba(255,255,255,0.2);margin-left:8px">v1.0</span></div><span style={{fontSize:11,color:"rgba(255,255,255,.5)"}}>Faouzi Talabi</span></div></div>
  <div style={{maxWidth:520,margin:"0 auto",padding:"14px 20px 40px"}}><Dashboard/></div>
</div>}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>


</body>
</html>
